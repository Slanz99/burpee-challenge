// 50/50 sort: male/female alternating
const sortLegends = legs => {
  const m = legs.filter(l=>l.gender!=='female');
  const f = legs.filter(l=>l.gender==='female');
  const out = [];
  for(let i=0;i<Math.max(m.length,f.length);i++){
    if(i<m.length) out.push(m[i]);
    if(i<f.length) out.push(f[i]);
  }
  return out;
};

const getByCat = (leg, cat) => {
  const pool = leg[`quotes_${cat}`];
  return (pool&&pool.length) ? pool : leg.quotes;
};
const getTwoLegends = legends => {
  const pool = (legends&&legends.length>=2) ? legends : LEGENDS_FALLBACK;
  const s = [...pool].sort(()=>Math.random()-0.5);
  const qa = rnd(getByCat(s[0],'bekloppt')||s[0].quotes);
  const qb = rnd(getByCat(s[1],'bekloppt')||s[1].quotes);
  return [
    {...s[0], anheizer:qa.anheizer, selectedQuote:qa.quote},
    {...s[1], anheizer:qb.anheizer, selectedQuote:qb.quote},
  ];
};
const getJokerQuote = legends => {
  const pool = (legends&&legends.length) ? legends : LEGENDS_FALLBACK;
  const l = rnd(pool);
  const src = getByCat(l,'original') || getByCat(l,'bekloppt') || l.quotes;
  const q = rnd(src);
  return {char:l.char, emoji:l.emoji, color:l.color, quote:q.quote};
};

function Avatar({profile, size=40, legends, showGimmick=true}){
  const legendId = profile?.avatar_legend || profile?.avatar || 'chuck';
  const pose = profile?.avatar_pose || (Math.floor(Math.random()*3)+1);
  const leg = legends ? legends.find(l=>l.id===legendId) : null;
  const color = leg?.color || '#e63946';
  const svgStr = (POSE_SVGS[pose]||POSE_SVGS[1])(color);

  let borderColor='#1f1f1f', glow='none';
  if(profile?.joker_swapped){borderColor='#8b5cf6';glow='0 0 10px rgba(139,92,246,0.5)';}

  let badge = null;
  if(showGimmick){
    if(profile?.joker_swapped)       badge=<span style={{position:'absolute',bottom:-2,right:-2,fontSize:'0.6rem',background:'#8b5cf6',borderRadius:'50%',width:15,height:15,display:'flex',alignItems:'center',justifyContent:'center'}}>⚡</span>;
    else if((profile?.jokers_used||0)>0) badge=<span style={{position:'absolute',bottom:-2,right:-2,fontSize:'0.6rem',background:'#333',borderRadius:'50%',width:15,height:15,display:'flex',alignItems:'center',justifyContent:'center'}}>🎭</span>;
    else if((profile?.half_used||0)>0)   badge=<span style={{position:'absolute',bottom:-2,right:-2,fontSize:'0.6rem',background:'#1e3a5f',borderRadius:'50%',width:15,height:15,display:'flex',alignItems:'center',justifyContent:'center'}}>🌙</span>;
  }

  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <div style={{width:size,height:size,borderRadius:'50%',background:'#0d0d0d',border:`2px solid ${borderColor}`,boxShadow:glow,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}>
        {leg
          ? <div style={{width:size*0.88,height:size*0.88}} dangerouslySetInnerHTML={{__html:svgStr}}/>
          : <span style={{fontSize:size*0.45}}>{profile?.emoji||'💪'}</span>
        }
      </div>
      {badge}
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  COUNTDOWN
// ─────────────────────────────────────────────────────────
function Countdown(){
  const [time, setTime] = useState(null);
  useEffect(()=>{
    const calc = () => {
      const now = new Date();
      const start = new Date(START_DATE); start.setHours(0,0,0,0);
      const diff = start - now;
      if(diff<=0){setTime(null);return;}
      setTime({
        d: Math.floor(diff/86400000),
        h: Math.floor((diff%86400000)/3600000),
        m: Math.floor((diff%3600000)/60000),
        s: Math.floor((diff%60000)/1000),
      });
    };
    calc();
    const iv = setInterval(calc, 1000);
    return () => clearInterval(iv);
  },[]);
  if(!time) return null;
  return(
    <div style={{margin:'0 1.25rem 1rem',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'16px',padding:'1rem',textAlign:'center'}}>
      <div className="bc" style={{fontSize:'0.65rem',color:'var(--muted)',letterSpacing:'0.15em',marginBottom:'8px'}}>⏳ CHALLENGE STARTET IN</div>
      <div style={{display:'flex',justifyContent:'center',gap:'8px'}}>
        {[[time.d,'TAGE'],[time.h,'STD'],[time.m,'MIN'],[time.s,'SEK']].map(([v,l])=>(
          <div key={l} style={{background:'var(--bg3)',borderRadius:'10px',padding:'8px 10px',minWidth:'48px'}}>
            <div className="bc" style={{fontSize:'1.6rem',fontWeight:900,color:'var(--red)',lineHeight:1}}>{String(v).padStart(2,'0')}</div>
            <div style={{fontSize:'0.55rem',color:'var(--muted)',marginTop:'2px',letterSpacing:'0.1em'}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:'0.75rem',color:'var(--muted)',marginTop:'8px'}}>22. März 2026 · Tag 1</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  DAILY LEGEND ANNOUNCEMENT
// ─────────────────────────────────────────────────────────
function DailyLegend({legends, cur}){
  if(cur===0 || !legends || !legends.length) return null;

  // Deterministic: same legend for everyone on same day
  const pool = legends.length ? legends : LEGENDS_FALLBACK;
  const legIndex = (cur - 1) % pool.length;
  const leg = pool[legIndex];
  if(!leg || !leg.quotes || !leg.quotes.length) return null;

  // Deterministic quote: based on day number
  const bekloppte = (leg.quotes_bekloppt&&leg.quotes_bekloppt.length) ? leg.quotes_bekloppt : leg.quotes;
  const q = bekloppte[(cur - 1) % bekloppte.length];
  const d = DAYS[cur - 1];
  const t = tot(d);

  return(
    <div style={{margin:'0 1.25rem 1rem',background:`${leg.color}15`,border:`2px solid ${leg.color}55`,borderRadius:'18px',padding:'1.25rem',overflow:'hidden',position:'relative'}}>
      {/* Decorative bg emoji */}
      <div style={{position:'absolute',right:'-10px',top:'-10px',fontSize:'5rem',opacity:0.07,transform:'rotate(15deg)',pointerEvents:'none',userSelect:'none'}}>
        {leg.emoji}
      </div>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'10px'}}>
        <div style={{width:42,height:42,borderRadius:'50%',background:'#0d0d0d',border:`2px solid ${leg.color}`,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{width:34,height:34}} dangerouslySetInnerHTML={{__html:(POSE_SVGS[1])(leg.color)}}/>
        </div>
        <div>
          <div style={{fontSize:'0.6rem',color:leg.color,letterSpacing:'0.15em',fontWeight:700,fontFamily:'Barlow Condensed,sans-serif'}}>HEUTIGE MISSION · TAG {cur}</div>
          <div className="bc" style={{fontSize:'1rem',fontWeight:800,color:'var(--text)',letterSpacing:'0.03em'}}>{leg.char.toUpperCase()} SAGT:</div>
        </div>
      </div>

      {/* Quote */}
      <p style={{fontSize:'0.92rem',lineHeight:1.55,color:'#ddd',fontStyle:'italic',marginBottom:'10px'}}>
        "{q.quote}"
      </p>

      {/* Today's target */}
      <div style={{display:'flex',alignItems:'center',gap:'8px',paddingTop:'10px',borderTop:`1px solid ${leg.color}33`}}>
        <div className="bc" style={{fontSize:'1.4rem',fontWeight:900,color:leg.color,lineHeight:1}}>{t}</div>
        <div>
          <div className="bc" style={{fontSize:'0.7rem',color:'var(--text)',fontWeight:700,letterSpacing:'0.05em'}}>BURPEES HEUTE</div>
          <div style={{fontSize:'0.65rem',color:'var(--muted)'}}>{d.oneGo?'In one go':d.sets.join(' + ')+' Reps'}</div>
        </div>
        <div style={{marginLeft:'auto',background:leg.color,borderRadius:'8px',padding:'4px 10px'}}>
          <div className="bc" style={{fontSize:'0.7rem',fontWeight:800,color:'#fff',letterSpacing:'0.08em'}}>{leg.begriff||leg.abteilung}</div>
        </div>
      </div>
    </div>
  );
}

      const r = JSON.parse(localStorage.getItem('burpee_reward'));
      if(!r) return null;
      if(r.date !== new Date().toDateString()){ localStorage.removeItem('burpee_reward'); return null; }
      return r;
    }catch(e){ return null; }
  });

  if(!reward) return null;

  return(
    <div style={{margin:'0 1.25rem 1rem',background:`${reward.color}18`,border:`1px solid ${reward.color}44`,borderRadius:'16px',padding:'1rem 1.25rem',position:'relative'}}>
      <button onClick={()=>{localStorage.removeItem('burpee_reward');setReward(null);}}
        style={{position:'absolute',top:'10px',right:'12px',background:'none',border:'none',color:'var(--muted)',fontSize:'0.9rem',padding:'0'}}>✕</button>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}}>
        <span style={{fontSize:'1.6rem'}}>{reward.emoji}</span>
        <div>
          <div className="bc" style={{fontSize:'0.65rem',color:reward.color,letterSpacing:'0.12em',fontWeight:700}}>HEUTE VERDIENT 🏆</div>
          <div className="bc" style={{fontSize:'0.85rem',fontWeight:800,color:'var(--text)'}}>{reward.char.toUpperCase()} SAGT:</div>
        </div>
      </div>
      <p style={{fontSize:'0.88rem',lineHeight:1.55,color:'#ccc',fontStyle:'italic'}}>"{reward.quote}"</p>
    </div>
  );
}

function TeamSection({leaders, user, legends, onNudge, achievements, onKudo, onAvatarTap, onStatusTap, onPaktTap, completionData}){
  const today = new Date().toDateString();
  const cur   = getChallengeDay();

  // Early bird: who completed today's challenge first (reuses cur from above)
  const todayCompletions = (completionData||[]).filter(c=>c.day===cur&&c.completed_at);
  todayCompletions.sort((a,b)=>new Date(a.completed_at)-new Date(b.completed_at));
  const earlyBird = todayCompletions.length>0 ? todayCompletions[0].name : null;

  // Real team burpees: sum of all completed days' burpee counts
  const teamBurpees = leaders.reduce((a,u) => {
    const days = u.completed_days || 0;
    return a + DAYS.slice(0, Math.min(days, 30)).reduce((s,d) => s + tot(d), 0);

  const teamTotal = leaders.reduce((a,u) => a + (u.completed_days||0), 0);

          <div className="bc" style={{fontSize:'1.8rem',fontWeight:900,color:'var(--green)',lineHeight:1}}>{teamBurpees.toLocaleString('de-DE')}</div>
          <div style={{fontSize:'0.62rem',color:'var(--muted)',marginTop:'2px'}}>Burpees Team</div>
        </div>
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px',padding:'0.75rem',textAlign:'center'}}>
          <div className="bc" style={{fontSize:'1.8rem',fontWeight:900,color:'var(--gold)',lineHeight:1}}>{Math.round(leaders.reduce((a,u)=>a+(u.completed_days||0),0)/Math.max(leaders.length,1)*100/30)}%</div>

                {milestone&&q?`"${q.quote}"`:motto}
              </p>
              {!milestone&&<button onClick={()=>setMotto(rnd(MOTIVATIONS))} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'8px',padding:'6px 8px',color:'var(--muted)',fontSize:'0.9rem',flexShrink:0}}>↻</button>}
            </div>
          </div>
        );
      })()}

      {leaders.length>0&&(
        <div style={{padding:'0 1.25rem 1rem'}}>
          <TeamSection leaders={leaders} user={user} legends={legends} onNudge={onNudge} achievements={achievements} onKudo={onKudo} onAvatarTap={onAvatarTap} onStatusTap={onStatusTap} onPaktTap={onPaktTap} completionData={allCompletions}/>
        </div>
      )}
      {leaders.length < 12 && <InviteCard groupSize={leaders.length} leaders={leaders} user={user}/>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  CALENDAR TAB
// ─────────────────────────────────────────────────────────
function CalendarTab({completed, completionTypes, onOpenDay}){
  const cur = getChallengeDay();
  return(
    <div style={{flex:1,overflowY:'auto',padding:'1.25rem'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'1rem'}}>
        <div className="bc" style={{fontSize:'1.6rem',fontWeight:800,letterSpacing:'0.05em'}}>30-TAGE PLAN</div>
        <div style={{fontSize:'0.7rem',color:'var(--muted)'}}>Tap zum Nachtragen</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'8px'}}>
        {DAYS.map(d=>{
          const isDone  = completed.has(d.day);
          const type    = completionTypes[d.day];
          const isToday = d.day===cur&&!isDone;
          const t = tot(d);
          let bg='var(--bg2)',border='1.5px solid var(--border)',color='var(--text)';
          if(isDone){
            if(type==='joker')     {bg='rgba(100,100,100,0.1)';border='1.5px solid #333';color='#444';}
            else if(type==='half') {bg='rgba(30,58,95,0.3)';border='1.5px solid #1e3a5f';color='#60a5fa';}
            else                   {bg='rgba(74,222,128,0.1)';border='1.5px solid #2d5a2d';color='var(--green)';}
          } else if(isToday)       {bg='rgba(230,57,70,0.12)';border='1.5px solid var(--red)';color='var(--red)';}
          return(
            <button key={d.day} onClick={()=>onOpenDay(d.day)}
              style={{background:bg,border,borderRadius:'12px',padding:'10px 6px',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',minHeight:'68px'}}>
              <span style={{fontSize:'0.58rem',color:isDone?color:isToday?'var(--red)':'var(--muted)',fontWeight:600}}>{isDone?(type==='joker'?'🃏':type==='half'?'🌙':'✓'):isToday?'●':d.day}</span>
              <span className="bc" style={{fontSize:'1.15rem',fontWeight:800,color,lineHeight:1}}>{type==='joker'?'–':type==='half'?Math.ceil(t/2):t}</span>
              {d.oneGo&&type!=='joker'&&<span style={{fontSize:'0.45rem',color:isDone?color:'#8b1a1a',fontWeight:700}}>1GO</span>}
            </button>
          );
        })}
      </div>
      <div style={{display:'flex',gap:'0.75rem',marginTop:'1.25rem',flexWrap:'wrap'}}>
        {[['var(--green)','✓ Voll'],['#60a5fa','🌙 Halb'],['#555','🃏 Joker'],['var(--red)','Heute']].map(([c,l])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:'5px'}}>
            <div style={{width:'10px',height:'10px',borderRadius:'3px',background:c}}/>
            <span style={{fontSize:'0.75rem',color:'var(--muted)'}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  WALL TAB
// ─────────────────────────────────────────────────────────
function WallTab({user, profile, legends, wall, onPost, onReact, onOpenCommunity, onPinPost, sosEvents, comebackVotes, legendPowers, onSendPower, onComebackVote, userName}){
  const [text, setText]       = useState('');
  const [posting, setPosting] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [replyTo, setReplyTo] = useState(null); // {id, name}
  const fileRef = useRef();
  const galleryRef = useRef();

  const submit = async (imageUrl=null) => {
    if((!text.trim()&&!imageUrl)||posting) return;
    setPosting(true);
    await onPost(text.trim()||'📸', imageUrl, replyTo?.id||null);
    setText('');
    setReplyTo(null);
    setPosting(false);
  };

  const handlePhoto = async e => {
    const file = e.target.files[0]; if(!file) return;
    setUploading(true);
    try{
      const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
      const path = `${user}_${Date.now()}.${ext}`;
      const {data, error} = await db.storage.from('wall-photos').upload(path, file, {contentType:file.type, upsert:true});
      if(error){
        // Show inline error, not alert
        showToast('📸 Bucket fehlt — in Supabase Storage "wall-photos" anlegen (Public)');
        setUploading(false); e.target.value=''; return;
      }
      const {data:{publicUrl}} = db.storage.from('wall-photos').getPublicUrl(path);
      await submit(publicUrl);
    }catch(err){
      console.error(err);
      showToast('📸 Upload fehlgeschlagen');
    }
    setUploading(false);
    e.target.value='';
  };

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'1.25rem 1.25rem 0.75rem',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.9rem'}}>
          <div className="bc" style={{fontSize:'1.6rem',fontWeight:800,letterSpacing:'0.05em'}}>🔥 MOTIVATION WALL</div>
          <button onClick={onOpenCommunity} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'10px',padding:'6px 12px',color:'var(--text)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:'0.8rem',letterSpacing:'0.05em'}}>💬 SPRÜCHE</button>
        </div>
        {replyTo&&<div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px',background:'var(--bg3)',borderRadius:'10px',padding:'6px 10px'}}>
          <span style={{fontSize:'0.75rem',color:'var(--muted)'}}>↩ Antwort an <b style={{color:'var(--text)'}}>{replyTo.name}</b></span>
          <button onClick={()=>setReplyTo(null)} style={{background:'none',border:'none',color:'var(--muted)',fontSize:'0.8rem',marginLeft:'auto',padding:'0'}}>✕</button>
        </div>}
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          <Avatar profile={profile} size={36} legends={legends}/>
          <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Motiviere dein Team..."
            style={{flex:1,padding:'0.8rem 1rem',background:'var(--bg3)',border:'2px solid var(--border)',borderRadius:'12px',color:'var(--text)',fontSize:'0.9rem',outline:'none'}}/>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:'none'}}/>
          <input ref={galleryRef} type="file" accept="image/*" onChange={handlePhoto} style={{display:'none'}}/>
          <button onClick={()=>fileRef.current.click()} disabled={uploading} title="Foto aufnehmen"
            style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'12px',padding:'0 0.6rem',color:uploading?'var(--muted)':'var(--text)',fontSize:'1.1rem',height:'44px',flexShrink:0}}>
            {uploading?'⏳':'📷'}
          </button>
          <button onClick={()=>galleryRef.current.click()} disabled={uploading} title="Aus Galerie wählen"
            style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'12px',padding:'0 0.6rem',color:uploading?'var(--muted)':'var(--text)',fontSize:'1.1rem',height:'44px',flexShrink:0}}>
            🖼️
          </button>
          <button onClick={()=>submit()} disabled={!text.trim()||posting}
            style={{background:'var(--red)',border:'none',borderRadius:'12px',padding:'0 1rem',color:'#fff',fontSize:'1.2rem',height:'44px',opacity:(!text.trim()||posting)?0.4:1,flexShrink:0}}>→</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'0.75rem 1.25rem'}}>
        {wall.length===0&&<div style={{textAlign:'center',padding:'4rem 1rem'}}><div style={{fontSize:'3rem',marginBottom:'0.75rem'}}>💬</div><p style={{color:'var(--muted)',fontSize:'0.9rem'}}>Noch keine Posts!</p></div>}
        {(sosEvents||[]).filter(s=>s.active&&s.from_name!==userName).map(s=>(
          <SosCard key={s.id} event={s} legends={legends} user={userName} onSendPower={onSendPower}/>
        ))}
        {[...new Set((comebackVotes||[]).map(v=>v.for_name))].filter(n=>n!==userName).map(forName=>{
          const votes={};
          (comebackVotes||[]).filter(v=>v.for_name===forName).forEach(v=>{votes[v.legend_id]=(votes[v.legend_id]||0)+1;});
          const myVote=(comebackVotes||[]).find(v=>v.for_name===forName&&v.voter_name===userName)?.legend_id;
          return <ComebackVotingCard key={forName} event={{for_name:forName,votes}} legends={legends} userName={userName} onVote={onComebackVote} myVote={myVote}/>;
        })}
        {wall.filter(p=>p.pinned).map(p=>(
          <div key={`pin-${p.id}`} style={{background:'rgba(245,158,11,0.08)',border:'2px solid rgba(245,158,11,0.4)',borderRadius:'16px',padding:'0.75rem 1rem',marginBottom:'8px',display:'flex',alignItems:'center',gap:'8px'}}>
            <span style={{fontSize:'0.9rem',flexShrink:0}}>📌</span>
            <p style={{fontSize:'0.85rem',color:'#ddd',flex:1,fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.message}</p>
            <span style={{fontSize:'0.7rem',color:'var(--muted)',flexShrink:0}}>{p.name}</span>
          </div>
        ))}
        {wall.map((p,i)=>(
          <div key={p.id} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'16px',padding:'1rem',marginBottom:'10px',animation:`slideUp 0.3s ${i*0.04}s ease both`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <Avatar profile={{avatar:p.avatar,avatar_legend:p.avatar_legend,avatar_pose:p.avatar_pose}} size={34} legends={legends}/>
                <div>
                  <div style={{fontSize:'0.85rem',fontWeight:600,color:p.name===user?'var(--red)':'var(--text)'}}>{p.name}</div>
                  <div style={{fontSize:'0.68rem',color:'var(--muted)'}}>Tag {p.day}</div>
                </div>
              </div>
              <span style={{fontSize:'0.68rem',color:'var(--muted)',flexShrink:0}}>{new Date(p.created_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span>
            </div>
            {p.image_url&&<img src={p.image_url} alt="" style={{width:'100%',borderRadius:'10px',marginBottom:'8px',maxHeight:'280px',objectFit:'cover'}}/>}
            {p.message&&p.message!=='📸'&&<p style={{fontSize:'0.92rem',lineHeight:1.5,margin:'0 0 0.75rem',color:'#ddd'}}>{p.message}</p>}
            <div style={{display:'flex',flexWrap:'wrap',gap:'5px',alignItems:'center'}}>
              {EMOJIS.map(e=>{
                const count = p.reactions?.[e]||0;
                return(
                  <button key={e} onClick={()=>onReact(p.id,e)}
                    style={{background:count>0?'rgba(230,57,70,0.12)':'var(--bg3)',border:`1px solid ${count>0?'rgba(230,57,70,0.3)':'var(--border)'}`,borderRadius:'8px',padding:'4px 8px',fontSize:'0.85rem',display:'flex',alignItems:'center',gap:'4px'}}>
                    {e}{count>0&&<span style={{color:'var(--muted)',fontSize:'0.7rem'}}>{count}</span>}
                  </button>
                );
              })}
              <button onClick={()=>{setReplyTo({id:p.id,name:p.name});}}
                style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'8px',padding:'4px 10px',fontSize:'0.75rem',color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'0.05em'}}>
                ↩ Antwort
              </button>
              <button onClick={()=>onPinPost(p.id)}
                style={{background:'none',border:'none',fontSize:'0.85rem',color:p.pinned?'var(--gold)':'var(--muted)',padding:'4px 6px'}} title="Anheften">
                📌
              </button>
            </div>
            {p.reply_to&&wall.find(r=>r.id===p.reply_to)&&(
              <div style={{marginTop:'6px',paddingLeft:'10px',borderLeft:'2px solid var(--border)',opacity:0.6}}>
                <span style={{fontSize:'0.7rem',color:'var(--muted)'}}>↩ {wall.find(r=>r.id===p.reply_to)?.name}: </span>
                <span style={{fontSize:'0.72rem',color:'var(--muted)',fontStyle:'italic'}}>{wall.find(r=>r.id===p.reply_to)?.message?.slice(0,60)}{wall.find(r=>r.id===p.reply_to)?.message?.length>60?'...':''}</span>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  WORKOUT SCREEN
// ─────────────────────────────────────────────────────────
function WorkoutScreen({dayNum, completed, completionTypes, profile, legends, onComplete, onHalf, onJoker, onUndo, onBack}){
  const [showJoker, setShowJoker] = useState(false);
  const jokerQuote = useRef(getJokerQuote(legends)).current;
  const d       = DAYS[dayNum-1];
  const t       = tot(d);
  const isDone  = completed.has(dayNum);
  const type    = completionTypes[dayNum];
  const halfT   = Math.ceil(t/2);
  const jokersLeft = 1-(profile?.jokers_used||0)-(profile?.joker_swapped?1:0);
  const halfLeft   = 2+(profile?.joker_swapped?1:0)-(profile?.half_used||0);

  return(
    <>
      <div style={{position:'fixed',inset:0,background:'var(--bg)',zIndex:100,display:'flex',flexDirection:'column',animation:'slideUp 0.3s ease both'}}>
        <div style={{padding:'calc(var(--safe-t) + 1rem) 1.25rem 0.75rem',display:'flex',alignItems:'center',gap:'1rem',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <button onClick={onBack} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'10px',padding:'8px 14px',color:'var(--text)',fontSize:'0.9rem'}}>←</button>
          <div className="bc" style={{fontSize:'1rem',fontWeight:700,letterSpacing:'0.1em',color:'var(--muted)'}}>TAG {dayNum} VON 30</div>
          {isDone&&<div style={{marginLeft:'auto',borderRadius:'100px',padding:'4px 12px',fontSize:'0.72rem',fontWeight:600,
            background:type==='joker'?'rgba(80,80,80,0.2)':type==='half'?'rgba(30,58,95,0.3)':'rgba(74,222,128,0.15)',
            border:type==='joker'?'1px solid #444':type==='half'?'1px solid #1e3a5f':'1px solid #2d5a2d',
            color:type==='joker'?'#888':type==='half'?'#60a5fa':'var(--green)'}}>
            {type==='joker'?'🃏 Joker':type==='half'?'🌙 Halbe':'✓ Erledigt'}
          </div>}
        </div>

        <div style={{textAlign:'center',padding:'1.75rem 1.25rem 1.25rem',flexShrink:0}}>
          <div className="bc" style={{fontWeight:900,fontSize:'min(28vw,7rem)',color:'var(--red)',lineHeight:0.9}}>{type==='joker'?'🃏':type==='half'?halfT:t}</div>
          <div className="bc" style={{fontWeight:700,fontSize:'1.4rem',letterSpacing:'0.2em',color:'var(--muted)',marginTop:'4px'}}>
            {type==='joker'?'SKIP TAG':'BURPEES'}{type==='half'&&<span style={{color:'#60a5fa'}}> (HALBE)</span>}
          </div>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'0 1.25rem'}}>
          {type!=='joker'&&(d.oneGo?(
            <div style={{background:'rgba(230,57,70,0.08)',border:'2px solid rgba(230,57,70,0.35)',borderRadius:'18px',padding:'1.75rem',textAlign:'center',marginBottom:'1rem'}}>
              <div className="bc" style={{fontSize:'2rem',fontWeight:900,color:'var(--red)',letterSpacing:'0.05em'}}>IN ONE GO</div>
              <div style={{color:'var(--muted)',fontSize:'0.8rem',marginTop:'0.5rem'}}>Alle {type==='half'?halfT:t} Burpees am Stück</div>
              <div style={{display:'inline-block',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'8px',padding:'6px 14px',fontSize:'0.75rem',color:'var(--muted)',marginTop:'0.75rem'}}>20 Sek. Pause zwischen Sätzen</div>
            </div>
          ):(
            <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'18px',padding:'1.25rem',marginBottom:'1rem'}}>
              {d.sets.map((s,i)=>{
                const hs = Math.ceil(s/2);
                return(
                  <div key={i}>
                    <div style={{display:'flex',alignItems:'center',padding:'0.6rem 0',gap:'1rem'}}>
                      <div style={{width:'28px',height:'28px',borderRadius:'50%',background:'var(--bg3)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.72rem',color:'var(--muted)',flexShrink:0}}>{i+1}</div>
                      <span className="bc" style={{flex:1,fontSize:'1.3rem',fontWeight:700}}>{type==='half'?hs:s} Burpees</span>
                      {type==='half'&&<span style={{fontSize:'0.7rem',color:'#60a5fa'}}>🌙</span>}
                    </div>
                    {i<d.sets.length-1&&<div style={{textAlign:'center',fontSize:'0.72rem',color:'var(--muted)',padding:'3px 0',borderTop:'1px dashed var(--border)',borderBottom:'1px dashed var(--border)',margin:'0 2rem'}}>↓ &nbsp;20 Sek. Pause</div>}
                  </div>
                );
              })}
            </div>
          ))}
          {type==='joker'&&<div style={{background:'#111',border:'2px solid #333',borderRadius:'18px',padding:'1.75rem',textAlign:'center',marginBottom:'1rem'}}><div style={{fontSize:'3rem',marginBottom:'0.5rem'}}>🃏</div><div className="bc" style={{fontSize:'1.2rem',fontWeight:800,color:'#888'}}>JOKER EINGESETZT</div></div>}
        </div>

        <div style={{padding:'1rem 1.25rem',paddingBottom:'calc(1rem + var(--safe-b))',flexShrink:0,borderTop:'1px solid var(--border)'}}>
          {!isDone?(
            <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              <button onClick={()=>onComplete(dayNum)} style={{width:'100%',padding:'1.1rem',background:'var(--red)',border:'none',borderRadius:'16px',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontSize:'1.4rem',fontWeight:800,letterSpacing:'0.08em',boxShadow:'0 6px 28px rgba(230,57,70,0.4)'}}>✓ GESCHAFFT!</button>
              <div style={{display:'flex',gap:'8px'}}>
                {halfLeft>0&&<button onClick={()=>onHalf(dayNum)} style={{flex:1,padding:'0.85rem',background:'rgba(30,58,95,0.3)',border:'2px solid #1e3a5f',borderRadius:'14px',color:'#60a5fa',fontFamily:'Barlow Condensed,sans-serif',fontSize:'0.95rem',fontWeight:700,letterSpacing:'0.05em'}}>🌙 Halbe ({halfLeft}×)</button>}
                <button onClick={()=>setShowJoker(true)} style={{flex:1,padding:'0.85rem',background:'rgba(100,100,100,0.1)',border:'2px solid #2a2a2a',borderRadius:'14px',color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontSize:'0.95rem',fontWeight:700,letterSpacing:'0.05em'}}>🃏 Joker {jokersLeft>0?'(1×)':'(0×)'}</button>
              </div>
            </div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              <div className="bc" style={{background:type==='joker'?'rgba(60,60,60,0.2)':type==='half'?'rgba(30,58,95,0.2)':'rgba(74,222,128,0.1)',border:type==='joker'?'2px solid #333':type==='half'?'2px solid #1e3a5f':'2px solid #2d5a2d',borderRadius:'16px',padding:'1.1rem',textAlign:'center',fontSize:'1.3rem',fontWeight:800,letterSpacing:'0.05em',color:type==='joker'?'#666':type==='half'?'#60a5fa':'var(--green)'}}>
                {type==='joker'?'🃏 JOKER':type==='half'?'🌙 HALBE DONE':'✓ TAG '+dayNum+' DONE!'}
              </div>
              <button onClick={()=>onUndo(dayNum)} style={{background:'none',border:'none',color:'var(--muted)',fontSize:'0.8rem',padding:'0.5rem'}}>Als unerledigt markieren</button>
            </div>
          )}
        </div>
      </div>
      {showJoker&&<JokerModal profile={profile} jokerQuote={jokerQuote} onCancel={()=>setShowJoker(false)} onConfirm={async()=>{setShowJoker(false);await onJoker(dayNum);}} onSwap={async()=>{setShowJoker(false);await onJoker(dayNum,'swap');}}/>}
    </>
  );
}

// ─────────────────────────────────────────────────────────
//  COMMUNITY QUOTES
// ─────────────────────────────────────────────────────────
function CommunityQuotes({user, legends, submissions, onSubmit, onVote, onClose}){
  const [step, setStep]           = useState('list');
  const [selLegend, setSelLegend] = useState('');
  const [anheizer, setAnheizer]   = useState('');
  const [quote, setQuote]         = useState('');
  const [sending, setSending]     = useState(false);

  const wordCount = anheizer.trim().split(/\s+/).filter(Boolean).length;
  const valid = selLegend && anheizer.trim() && wordCount<=5 && quote.trim().length>10;
  const alreadyVoted = sub => localStorage.getItem(`vote_${sub.id}`)==='1';

  const submit = async () => {
    if(!valid||sending) return;
    setSending(true);
    await onSubmit({legend_id:selLegend, anheizer:anheizer.trim(), quote:quote.trim(), submitted_by:user});
    setSelLegend(''); setAnheizer(''); setQuote(''); setStep('list'); setSending(false);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'var(--bg)',zIndex:300,display:'flex',flexDirection:'column',animation:'slideUp 0.3s ease both'}}>
      <div style={{padding:'calc(var(--safe-t) + 1rem) 1.25rem 0.75rem',display:'flex',alignItems:'center',gap:'1rem',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <button onClick={step==='form'?()=>setStep('list'):onClose} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'10px',padding:'8px 14px',color:'var(--text)',fontSize:'0.9rem'}}>←</button>
        <div className="bc" style={{fontSize:'1.2rem',fontWeight:800,letterSpacing:'0.05em',flex:1}}>{step==='list'?'💬 COMMUNITY SPRÜCHE':'✍️ SPRUCH EINREICHEN'}</div>
        {step==='list'&&<button onClick={()=>setStep('form')} style={{background:'var(--red)',border:'none',borderRadius:'10px',padding:'8px 14px',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:'0.9rem',letterSpacing:'0.05em'}}>+ NEU</button>}
      </div>

      {step==='list'&&(
        <div style={{flex:1,overflowY:'auto',padding:'1rem 1.25rem'}}>
          <p style={{color:'var(--muted)',fontSize:'0.82rem',marginBottom:'1rem',lineHeight:1.5}}>Ab <b style={{color:'var(--text)'}}>5 Votes</b> kommen Sprüche live in die App 🔥</p>

            return(
              <div key={sub.id} style={{background:'var(--bg2)',border:`1px solid ${sub.approved?'var(--green)':'var(--border)'}`,borderRadius:'14px',padding:'1rem',marginBottom:'10px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}}>
                  <span style={{fontSize:'1.1rem'}}>{leg?.emoji||'❓'}</span>
                  <div style={{flex:1}}>
                    <span className="bc" style={{fontSize:'0.85rem',fontWeight:700,color:leg?.color||'var(--text)'}}>{leg?.char||sub.legend_id}</span>
                    <span style={{color:'var(--muted)',fontSize:'0.7rem',marginLeft:'6px'}}>von {sub.submitted_by}</span>
                  </div>
                  {sub.approved&&<span style={{fontSize:'0.7rem',background:'rgba(74,222,128,0.15)',color:'var(--green)',border:'1px solid #2d5a2d',borderRadius:'100px',padding:'2px 8px'}}>✓ live</span>}
                </div>
                <div className="bc" style={{fontSize:'0.8rem',color:'var(--muted)',letterSpacing:'0.08em',marginBottom:'4px'}}>{sub.anheizer}</div>
                <p style={{fontSize:'0.88rem',lineHeight:1.5,color:'#ccc',fontStyle:'italic',marginBottom:'10px'}}>"{sub.quote}"</p>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:'0.75rem',color:'var(--muted)'}}>{sub.votes} / 5 Votes</span>
                  <button onClick={()=>!voted&&onVote(sub.id)}
                    style={{background:voted?'rgba(74,222,128,0.1)':'rgba(230,57,70,0.1)',border:`1px solid ${voted?'#2d5a2d':'rgba(230,57,70,0.3)'}`,borderRadius:'8px',padding:'5px 14px',color:voted?'var(--green)':'var(--red)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:'0.85rem',opacity:voted?0.6:1}}>
                    {voted?'✓ gevoted':'🔥 +1 Vote'}
                  </button>
                </div>
                {sub.votes>0&&<div style={{marginTop:'6px',height:'3px',background:'var(--bg3)',borderRadius:'2px',overflow:'hidden'}}><div style={{height:'100%',background:'var(--red)',borderRadius:'2px',width:`${Math.min((sub.votes/5)*100,100)}%`,transition:'width 0.4s ease'}}/></div>}
              </div>
            );
          })}
        </div>
      )}

      {step==='form'&&(
        <div style={{flex:1,overflowY:'auto',padding:'1rem 1.25rem'}}>
          <p style={{color:'var(--muted)',fontSize:'0.82rem',marginBottom:'1.25rem',lineHeight:1.5}}>Nach <b style={{color:'var(--text)'}}>5 Votes</b> geht dein Spruch live 🔥</p>
          <div style={{marginBottom:'1rem'}}>
            <p className="bc" style={{fontSize:'0.65rem',color:'var(--muted)',letterSpacing:'0.12em',marginBottom:'0.5rem'}}>LEGENDE WÄHLEN</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'8px'}}>
              {legends.map(l=>(
                <button key={l.id} onClick={()=>setSelLegend(l.id)}
                  style={{background:selLegend===l.id?`${l.color}22`:'var(--bg2)',border:`1.5px solid ${selLegend===l.id?l.color:'var(--border)'}`,borderRadius:'12px',padding:'10px',display:'flex',alignItems:'center',gap:'8px',textAlign:'left'}}>
                  <span style={{fontSize:'1.2rem'}}>{l.emoji}</span>
                  <span className="bc" style={{fontSize:'0.85rem',fontWeight:700,color:selLegend===l.id?l.color:'var(--text)'}}>{l.char}</span>
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:'1rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:'0.5rem'}}>
              <p className="bc" style={{fontSize:'0.65rem',color:'var(--muted)',letterSpacing:'0.12em'}}>ANHEIZER (3-5 WÖRTER)</p>
              <span style={{fontSize:'0.65rem',color:wordCount>5?'var(--red)':'var(--muted)'}}>{wordCount}/5</span>
            </div>
            <input value={anheizer} onChange={e=>setAnheizer(e.target.value)} placeholder="z.B. Schwerkraft führt 1:0!"
              style={{width:'100%',padding:'0.8rem 1rem',background:'var(--bg3)',border:`2px solid ${wordCount>5?'var(--red)':'var(--border)'}`,borderRadius:'12px',color:'var(--text)',fontSize:'0.9rem',outline:'none'}}/>
          </div>
          <div style={{marginBottom:'1.5rem'}}>
            <p className="bc" style={{fontSize:'0.65rem',color:'var(--muted)',letterSpacing:'0.12em',marginBottom:'0.5rem'}}>DER SPRUCH</p>
            <textarea value={quote} onChange={e=>setQuote(e.target.value)} placeholder="Der epische Spruch der Legende..."
              style={{width:'100%',padding:'0.8rem 1rem',background:'var(--bg3)',border:'2px solid var(--border)',borderRadius:'12px',color:'var(--text)',fontSize:'0.9rem',outline:'none',resize:'none',minHeight:'100px',lineHeight:1.5}}/>
          </div>
          <button onClick={submit} disabled={!valid||sending}
            style={{width:'100%',padding:'1rem',background:valid?'var(--red)':'var(--bg3)',border:'none',borderRadius:'14px',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontSize:'1.2rem',fontWeight:800,letterSpacing:'0.08em',opacity:(!valid||sending)?0.4:1,marginBottom:'calc(1rem + var(--safe-b))'}}>
            {sending?'WIRD EINGEREICHT...':'EINREICHEN 🔥'}
          </button>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────
//  STATS TAB (Heatmap + Wildcard + Finale)
// ─────────────────────────────────────────────────────────
function StatsTab({user, leaders, legends, completionData, wildcards, wildcardCompletions, onCallWildcard, onCompleteWildcard}){
  const [showWildcardModal, setShowWildcardModal] = useState(false);
  const cur = getChallengeDay();
  const names = leaders.map(l=>l.name);

  // ── Heatmap data ──
  // Build 30-day × member grid
  const completionMap = {};
  (completionData||[]).forEach(c=>{
    if(!completionMap[c.name]) completionMap[c.name] = {};
    const hour = c.completed_at ? new Date(c.completed_at).getHours() : 12;
    const timeSlot = hour < 9 ? '🌅' : hour < 13 ? '🌤' : hour < 18 ? '☀️' : '🌙';
    completionMap[c.name][c.day] = {type:c.type, timeSlot};
  });

  // Weekday pattern
  const weekdayCount = {};
  (completionData||[]).forEach(c=>{
    if(!c.completed_at) return;
    const day = new Date(c.completed_at).toLocaleDateString('de-DE',{weekday:'short'});
    weekdayCount[day] = (weekdayCount[day]||0)+1;
  });
  const weekdays = ['Mo','Di','Mi','Do','Fr','Sa','So'];

  // ── Active wildcard ──
  const now = new Date();
  const activeWC = wildcards.find(w=>new Date(w.expires_at)>now);
  const hasCalledWC = wildcards.some(w=>w.called_by===user);
  const hasCompletedWC = activeWC && wildcardCompletions.some(c=>c.wildcard_id===activeWC.id&&c.name===user);
  const wcParticipants = activeWC ? wildcardCompletions.filter(c=>c.wildcard_id===activeWC.id) : [];

  // ── Finale ──
  const isFinale = cur >= 30 && leaders.every(l=>l.completed_days>=30);
  const totalTeamBurpees = leaders.reduce((a,l)=>{
    return a + DAYS.slice(0,l.completed_days||0).reduce((s,d)=>s+tot(d),0);
  },0);
  const earliest = leaders.reduce((a,b)=>(a.completed_days||0)>(b.completed_days||0)?a:b,leaders[0]);
  const noJoker = leaders.filter(l=>!(l.jokers_used>0||l.half_used>0||l.joker_swapped));

  return(
    <div style={{flex:1,overflowY:'auto',padding:'1.25rem'}}>

      {/* ── FINALE ── */}
      {isFinale&&(
        <div style={{background:'linear-gradient(135deg,#3a2800,#5a3e00)',border:'2px solid var(--gold)',borderRadius:'18px',padding:'1.5rem',marginBottom:'1.5rem',textAlign:'center'}}>
          <div style={{fontSize:'3rem',marginBottom:'0.5rem'}}>🏆</div>
          <div className="bc" style={{fontSize:'1.8rem',fontWeight:900,color:'var(--gold)',letterSpacing:'0.05em',marginBottom:'0.5rem'}}>CHALLENGE ABGESCHLOSSEN!</div>
          <div style={{color:'#ddd',fontSize:'0.85rem',marginBottom:'1.25rem'}}>Das Team hat es geschafft. Alle 30 Tage. Gemeinsam.</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'8px',marginBottom:'1rem'}}>
            <div style={{background:'rgba(0,0,0,0.3)',borderRadius:'10px',padding:'0.75rem'}}>
              <div className="bc" style={{fontSize:'1.6rem',fontWeight:900,color:'var(--gold)'}}>{totalTeamBurpees.toLocaleString()}</div>
              <div style={{fontSize:'0.65rem',color:'var(--muted)'}}>Team-Burpees gesamt</div>
            </div>
            <div style={{background:'rgba(0,0,0,0.3)',borderRadius:'10px',padding:'0.75rem'}}>
              <div className="bc" style={{fontSize:'1.6rem',fontWeight:900,color:'var(--green)'}}>{noJoker.length}</div>
              <div style={{fontSize:'0.65rem',color:'var(--muted)'}}>Stahlarme 🦾</div>
            </div>
          </div>
          {noJoker.length>0&&<div style={{fontSize:'0.8rem',color:'var(--green)',marginBottom:'8px'}}>🦾 Stahlarm: {noJoker.map(l=>l.name).join(', ')}</div>}
          {earliest&&<div style={{fontSize:'0.8rem',color:'#60a5fa'}}>⚡ Schnellster: {earliest.name}</div>}
        </div>
      )}

      {/* ── WILDCARD ── */}
      <div className="bc" style={{fontSize:'0.68rem',color:'var(--muted)',letterSpacing:'0.15em',marginBottom:'0.65rem'}}>🎰 WILDCARD</div>
      {activeWC?(
        <div style={{background:'rgba(139,92,246,0.1)',border:'2px solid var(--purple)',borderRadius:'16px',padding:'1.25rem',marginBottom:'1.5rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
            <div>
              <div className="bc" style={{fontSize:'1rem',fontWeight:800,color:'#c4b5fd',letterSpacing:'0.05em'}}>AKTIVE WILDCARD!</div>
              <div style={{fontSize:'0.78rem',color:'var(--muted)',marginTop:'2px'}}>von {activeWC.called_by}</div>
            </div>
            <WildcardCountdown expires={activeWC.expires_at}/>
          </div>
          <p style={{fontSize:'0.9rem',color:'#ddd',marginBottom:'1rem',fontStyle:'italic'}}>"{activeWC.message}"</p>
          {/* Participants */}
          <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'1rem'}}>
            {names.map(n=>{
              const done = wcParticipants.some(c=>c.name===n);
              return(
                <div key={n} style={{background:done?'rgba(74,222,128,0.15)':'var(--bg3)',border:`1px solid ${done?'#2d5a2d':'var(--border)'}`,borderRadius:'8px',padding:'4px 10px',fontSize:'0.78rem',color:done?'var(--green)':'var(--muted)'}}>
                  {done?'✓ ':''}{n}
                </div>
              );
            })}
          </div>
          {!hasCompletedWC&&(
            <button onClick={()=>onCompleteWildcard(activeWC.id)}
              style={{width:'100%',padding:'0.9rem',background:'linear-gradient(135deg,#8b5cf6,#7c3aed)',border:'none',borderRadius:'12px',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontSize:'1.1rem',fontWeight:800,letterSpacing:'0.08em'}}>
              ⚡ WILDCARD ABGEHAKT!
            </button>
          )}
          {hasCompletedWC&&<div className="bc" style={{textAlign:'center',color:'var(--green)',fontSize:'1rem',fontWeight:700}}>✓ Du hast mitgemacht!</div>}
        </div>
      ):(
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'16px',padding:'1.25rem',marginBottom:'1.5rem',textAlign:'center'}}>
          <div style={{color:'var(--muted)',fontSize:'0.85rem',marginBottom:'1rem'}}>Keine aktive Wildcard — ruf eine aus!</div>
          <button
            onClick={()=>setShowWildcardModal(true)}
            disabled={hasCalledWC}
            style={{padding:'0.85rem 2rem',background:hasCalledWC?'var(--bg3)':'linear-gradient(135deg,#8b5cf6,#7c3aed)',border:'none',borderRadius:'12px',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontSize:'1.1rem',fontWeight:800,letterSpacing:'0.08em',opacity:hasCalledWC?0.4:1}}>
            {hasCalledWC?'Bereits gerufen':'🎰 WILDCARD RUFEN'}
          </button>
          {hasCalledWC&&<div style={{fontSize:'0.72rem',color:'var(--muted)',marginTop:'6px'}}>Du hast bereits eine Wildcard gerufen</div>}
        </div>
      )}

      {/* ── HEATMAP ── */}
      <div className="bc" style={{fontSize:'0.68rem',color:'var(--muted)',letterSpacing:'0.15em',marginBottom:'0.65rem'}}>📊 TEAM HEATMAP</div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'16px',padding:'1rem',marginBottom:'1.5rem',overflowX:'auto'}}>
        {/* Header: day numbers */}
        <div style={{display:'flex',alignItems:'center',gap:'0',marginBottom:'4px'}}>
          <div style={{width:'70px',flexShrink:0}}/>
          <div style={{display:'flex',gap:'2px'}}>
            {DAYS.map(d=>(
              <div key={d.day} style={{width:'18px',textAlign:'center',fontSize:'0.45rem',color:'var(--muted)',flexShrink:0}}>{d.day}</div>
            ))}
          </div>
        </div>
        {/* Rows per person */}
        {names.map(n=>(
          <div key={n} style={{display:'flex',alignItems:'center',gap:'0',marginBottom:'3px'}}>
            <div style={{width:'70px',fontSize:'0.65rem',color:n===user?'var(--red)':'var(--text)',fontWeight:n===user?600:400,flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n}</div>
            <div style={{display:'flex',gap:'2px'}}>
              {DAYS.map(d=>{
                const cell = completionMap[n]?.[d.day];
                const bg = !cell?'var(--bg3)':cell.type==='joker'?'#333':cell.type==='half'?'#1e3a5f':'rgba(74,222,128,0.5)';
                return(
                  <div key={d.day} style={{width:'18px',height:'14px',borderRadius:'2px',background:bg,flexShrink:0,border:d.day===cur?'1px solid var(--red)':d.day<cur&&!cell?'1px solid #2a2a2a':'none'}} title={cell?`${n} · Tag ${d.day}${cell.timeSlot?' · '+cell.timeSlot:''}`:d.day<=cur?`${n} · Tag ${d.day} · offen`:''}/>
                );
              })}
            </div>
          </div>
        ))}
        {/* Legend */}
        <div style={{display:'flex',gap:'10px',marginTop:'8px',paddingTop:'8px',borderTop:'1px solid var(--border)',flexWrap:'wrap'}}>
          {[['rgba(74,222,128,0.5)','✓ Voll'],['#1e3a5f','🌙 Halb'],['#333','🃏 Joker'],['var(--bg3)','– Offen']].map(([c,l])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:'4px'}}>
              <div style={{width:'12px',height:'10px',borderRadius:'2px',background:c,flexShrink:0}}/>
              <span style={{fontSize:'0.65rem',color:'var(--muted)'}}>{l}</span>
            </div>
          ))}
        </div>
      </div>

      {/* ── WOCHENTAG PATTERN ── */}
      <div className="bc" style={{fontSize:'0.68rem',color:'var(--muted)',letterSpacing:'0.15em',marginBottom:'0.65rem'}}>📅 WOCHENTAG-MUSTER</div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'16px',padding:'1rem',marginBottom:'1.5rem'}}>
        {weekdays.map(day=>{
          const count = weekdayCount[day]||0;
          const maxCount = Math.max(...weekdays.map(d=>weekdayCount[d]||0),1);
          const pct = Math.round((count/maxCount)*100);
          return(
            <div key={day} style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'}}>
              <div style={{width:'24px',fontSize:'0.75rem',color:'var(--muted)',flexShrink:0}}>{day}</div>
              <div style={{flex:1,height:'16px',background:'var(--bg3)',borderRadius:'4px',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,background:pct>70?'var(--green)':pct>40?'var(--gold)':'var(--red)',borderRadius:'4px',transition:'width 0.6s ease'}}/>
              </div>
              <div style={{width:'28px',textAlign:'right',fontSize:'0.72rem',color:'var(--muted)',flexShrink:0}}>{count}×</div>
            </div>
          );
        })}
      </div>

      {showWildcardModal&&<WildcardModal onCall={msg=>{setShowWildcardModal(false);onCallWildcard(msg);}} onCancel={()=>setShowWildcardModal(false)}/>}
    </div>
  );
}

// Mini countdown for wildcard
function WildcardCountdown({expires}){
  const [left, setLeft] = useState('');
  useEffect(()=>{
    const calc=()=>{
      const diff=new Date(expires)-new Date();
      if(diff<=0){setLeft('Abgelaufen');return;}
      const h=Math.floor(diff/3600000);
      const m=Math.floor((diff%3600000)/60000);
      setLeft(`${h}h ${m}m`);
    };
    calc();const iv=setInterval(calc,60000);return()=>clearInterval(iv);
  },[expires]);
  return <div className="bc" style={{fontSize:'0.85rem',fontWeight:700,color:'#c4b5fd',background:'rgba(139,92,246,0.2)',padding:'4px 10px',borderRadius:'8px'}}>{left}</div>;
}

function BottomNav({tab, setTab}){
  return(
    <div style={{flexShrink:0,background:'var(--bg)',borderTop:'1px solid var(--border)',paddingBottom:'var(--safe-b)',display:'flex'}}>
      {[{id:'home',icon:'🏠',label:'HOME'},{id:'calendar',icon:'📅',label:'PLAN'},{id:'wall',icon:'💬',label:'WALL'},{id:'stats',icon:'📊',label:'STATS'}].map(item=>{
        const active = tab===item.id;
        return(
          <button key={item.id} onClick={()=>setTab(item.id)}
            style={{flex:1,padding:'0.8rem 0.5rem',background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',opacity:active?1:0.4,transition:'opacity 0.15s'}}>
            <span style={{fontSize:'1.3rem'}}>{item.icon}</span>
            <span className="bc" style={{fontSize:'0.62rem',fontWeight:700,letterSpacing:'0.1em',color:active?'var(--red)':'var(--muted)'}}>{item.label}</span>
            {active&&<div style={{width:'16px',height:'2px',background:'var(--red)',borderRadius:'1px'}}/>}

}

// ─────────────────────────────────────────────────────────
//  APP
// ─────────────────────────────────────────────────────────
function App(){
  const [screen,          setScreen]          = useState('loading');
  const [tab,             setTab]             = useState('home');
  const [userName,        setUserName]        = useState('');
  const [completed,       setCompleted]       = useState(new Set());
  const [compTypes,       setCompTypes]       = useState({});
  const [profile,         setProfile]         = useState(null);
  const [legends,         setLegends]         = useState([]);
  const [leaders,         setLeaders]         = useState([]);
  const [wall,            setWall]            = useState([]);
  const [submissions,     setSubmissions]     = useState([]);
  const [kudos,           setKudos]           = useState([]);
  const [achievements,    setAchievements]    = useState([]);
  const [showKudoModal,   setShowKudoModal]   = useState(null);
  const [allCompletions,  setAllCompletions]  = useState([]);
  const [wildcards,       setWildcards]       = useState([]);
  const [notifications,   setNotifications]   = useState([]);
  const [activeNotif,     setActiveNotif]     = useState(null);
  const [avatarMenu,      setAvatarMenu]      = useState(null);
  const [showStatusModal, setShowStatusModal] = useState(false);
  const [showPaktModal,   setShowPaktModal]   = useState(false);
  const [sosEvents,       setSosEvents]       = useState([]);
  const [legendPowers,    setLegendPowers]    = useState([]);
  const [comebackVotes,   setComebackVotes]   = useState([]);
  const [activeSos,       setActiveSos]       = useState(null);
  const [pendingOverlay,  setPendingOverlay]  = useState(null); // {type,legend,quote,from}
  const [milestones,      setMilestones]      = useState([]);
  const [showCouch,       setShowCouch]       = useState(false);
  const [showSosBtn,      setShowSosBtn]      = useState(false);
  const [showWhatsNew,    setShowWhatsNew]    = useState(()=>{
    return localStorage.getItem('seen_version') !== APP_VERSION;
  }); // {name, x, y}
  const [wildcardCompletions, setWildcardCompletions] = useState([]);
  const [workoutDay,      setWorkoutDay]      = useState(null);
  const [feuerTarget,     setFeuerTarget]     = useState(null);
  const [showAvatarEditor,setShowAvatarEditor]= useState(false);
  const [showCommunity,   setShowCommunity]   = useState(false);
  const [toast,           setToast]           = useState('');
  const toastTimer = useRef(null);

  const showToast = msg => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(()=>setToast(''), 3200);
  };

  // ── Loaders ──
  const loadUser = useCallback(async name => {
    const {data:comp} = await db.from('day_completions').select('day,type').eq('name',name);
    if(comp){
      setCompleted(new Set(comp.map(d=>d.day)));
      const t={}; comp.forEach(d=>{t[d.day]=d.type||'full';}); setCompTypes(t);
    }
    const {data:prof} = await db.from('profiles').select('*').eq('name',name).single();
    if(prof) setProfile(prof);
    setScreen('main');
    loadNotifications(name);
    // Check for pending legend power
    const {data:pending} = await db.from('legend_powers').select('*').eq('to_name',name).eq('seen',false).order('created_at',{ascending:false}).limit(1);
    if(pending&&pending.length>0){
      const p=pending[0];
      const leg=LEGENDS_FALLBACK.find(l=>l.id===p.legend_id)||LEGENDS_FALLBACK[0];
      setPendingOverlay({type:'power',legend:leg,quote:p.quote,from:p.from_name,id:p.id});
    }
    // Check for comeback reveal
    const {data:comVotes} = await db.from('comeback_votes').select('*').eq('for_name',name);
    const {data:profData} = await db.from('profiles').select('comeback_seen,comeback_day').eq('name',name).single();
    if(comVotes&&comVotes.length>0&&profData&&!profData.comeback_seen){
      // Find winning legend
      const voteCounts={};
      comVotes.forEach(v=>{voteCounts[v.legend_id]=(voteCounts[v.legend_id]||0)+1;});
      const winnerId=Object.entries(voteCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
      const winLeg=LEGENDS_FALLBACK.find(l=>l.id===winnerId)||LEGENDS_FALLBACK[0];
      const q=rnd((getByCat&&getByCat(winLeg,'motivierend'))||winLeg.quotes);
      setPendingOverlay({type:'comeback',legend:winLeg,quote:q.quote,from:'Das Team'});
      await db.from('profiles').update({comeback_seen:true}).eq('name',name);
    }
  },[]);

  const loadLeaders = useCallback(async () => {
    const {data} = await db.from('profiles').select('*').order('completed_days',{ascending:false}).limit(15);
    if(data) setLeaders(data);
  },[]);

  const loadWall = useCallback(async () => {
    const {data} = await db.from('wall_posts').select('*').order('created_at',{ascending:false}).limit(60);
    if(data) setWall(data);
  },[]);

  const loadLegends = useCallback(async () => {
    const {data:legs} = await db.from('legends').select('*');
    const {data:qs}   = await db.from('quotes').select('*').eq('approved',true);
    if(legs&&qs){
      const grouped = legs.map(l=>({
        ...l,
        quotes:           qs.filter(q=>q.legend_id===l.id),
        quotes_kudo:      qs.filter(q=>q.legend_id===l.id && q.category==='kudo'),
        quotes_bekloppt:  qs.filter(q=>q.legend_id===l.id && q.category==='bekloppt'),
        quotes_original:  qs.filter(q=>q.legend_id===l.id && q.category==='original'),
        quotes_motivierend:qs.filter(q=>q.legend_id===l.id && q.category==='motivierend'),
        quotes_brutal:    qs.filter(q=>q.legend_id===l.id && q.category==='brutal'),
      })).filter(l=>l.quotes.length>0);
      setLegends(sortLegends(grouped));
    }
  },[]);

  const loadSubmissions = useCallback(async () => {
    const {data} = await db.from('quote_submissions').select('*').order('votes',{ascending:false});
    if(data) setSubmissions(data);
  },[]);

  const loadKudos = useCallback(async () => {
    const {data} = await db.from('kudos').select('*').order('created_at',{ascending:false}).limit(50);
    if(data) setKudos(data);
  },[]);

  const loadAllCompletions = useCallback(async () => {
    const {data} = await db.from('day_completions').select('name,day,type,completed_at');
    if(data) setAllCompletions(data);
  },[]);

  const loadNotifications = useCallback(async (name) => {
    const {data} = await db.from('notifications')
      .select('*').eq('to_name', name).eq('read', false)
      .order('created_at', {ascending:false}).limit(10);
    if(data && data.length > 0){
      setNotifications(data);
      setActiveNotif(data[0]);
    }
  },[]);

  const loadWildcards = useCallback(async () => {
    const {data:wc}   = await db.from('wildcards').select('*').order('created_at',{ascending:false}).limit(5);
    const {data:wcc}  = await db.from('wildcard_completions').select('*');
    if(wc)  setWildcards(wc);
    if(wcc) setWildcardCompletions(wcc);
  },[]);

  const loadAchievements = useCallback(async () => {
    const {data} = await db.from('achievements').select('*').order('created_at',{ascending:false});
    if(data) setAchievements(data);
  },[]);

  const loadSosData = useCallback(async () => {
    const {data:sos}    = await db.from('sos_events').select('*').eq('active',true).order('created_at',{ascending:false}).limit(5);
    const {data:powers} = await db.from('legend_powers').select('*').order('created_at',{ascending:false}).limit(20);
    const {data:cv}     = await db.from('comeback_votes').select('*').order('created_at',{ascending:false});
    const {data:ms}     = await db.from('milestones').select('*');
    if(sos)    setSosEvents(sos);
    if(powers) setLegendPowers(powers);
    if(cv)     setComebackVotes(cv);
    if(ms)     setMilestones(ms);
  },[]);

  // ── Init ──
  useEffect(()=>{
    const saved = localStorage.getItem('burpee_name');
    if(saved){ setUserName(saved); loadUser(saved); } else setScreen('onboarding');
    loadLeaders(); loadWall(); loadLegends(); loadSubmissions(); loadKudos(); loadAchievements(); loadAllCompletions(); loadWildcards(); loadSosData();
    const savedName = localStorage.getItem('burpee_name');
    if(savedName) loadNotifications(savedName);
    const ch = db.channel('live')
      .on('postgres_changes',{event:'*',schema:'public',table:'wall_posts'},loadWall)
      .on('postgres_changes',{event:'*',schema:'public',table:'profiles'},loadLeaders)
      .on('postgres_changes',{event:'*',schema:'public',table:'quote_submissions'},loadSubmissions)
      .on('postgres_changes',{event:'*',schema:'public',table:'kudos'},loadKudos)
      .on('postgres_changes',{event:'*',schema:'public',table:'achievements'},loadAchievements)
      .on('postgres_changes',{event:'*',schema:'public',table:'wildcards'},loadWildcards)
      .on('postgres_changes',{event:'*',schema:'public',table:'wildcard_completions'},loadWildcards)
      .on('postgres_changes',{event:'*',schema:'public',table:'notifications'},()=>loadNotifications(userName))
      .on('postgres_changes',{event:'*',schema:'public',table:'day_completions'},loadAllCompletions)
      .subscribe();
    return () => ch.unsubscribe();
  },[loadUser,loadLeaders,loadWall,loadLegends,loadSubmissions]);

  // ── Refresh profile ──
  const refreshProfile = async name => {
    const {data} = await db.from('profiles').select('*').eq('name',name).single();
    if(data){ setProfile(data); return data; } return null;
  };

  // ── Handlers ──
  const handleJoin = async (name, legendId, pose) => {
    await db.from('profiles').upsert({name, avatar:legendId, avatar_legend:legendId, avatar_pose:pose, completed_days:0, jokers_used:0, half_used:0, joker_swapped:false},{onConflict:'name',ignoreDuplicates:false});
    localStorage.setItem('burpee_name', name);
    setUserName(name); await loadUser(name);
    showToast(`🎉 Willkommen, ${name}!`);
  };

  const handleSaveAvatar = async (legendId, pose) => {
    setShowAvatarEditor(false);
    await db.from('profiles').update({avatar:legendId, avatar_legend:legendId, avatar_pose:pose}).eq('name',userName);
    await refreshProfile(userName); loadLeaders();
    showToast('🎨 Avatar gespeichert!');
  };

  const handleComplete = async dayNum => {
    const next = new Set(completed); next.add(dayNum);
    setCompleted(next); setCompTypes({...compTypes,[dayNum]:'full'});
    await db.from('day_completions').upsert({name:userName,day:dayNum,type:'full'},{onConflict:'name,day'});
    await db.from('profiles').update({completed_days:next.size,updated_at:new Date().toISOString()}).eq('name',userName);
    const freshCompleted = next; await handleUpdateStreak(freshCompleted);
    await refreshProfile(userName); loadLeaders();

    // ── Achievement detection ──
    // ⚡ Erster im Team heute
    const {count} = await db.from('day_completions')
      .select('*', {count:'exact',head:true})
      .eq('day', dayNum);
    if(count===1){
      await db.from('achievements').upsert({name:userName,type:'erster',day:dayNum},{onConflict:'name,type,day',ignoreDuplicates:true});
      showToast('🥇 ERSTER im Team heute!');
      await loadAchievements();
    }

    // 🔥 Streak — 7 Tage am Stück
    const lastDays = Array.from({length:7},(_,i)=>dayNum-i).filter(d=>d>0);
    const hasStreak = lastDays.length===7 && lastDays.every(d=>next.has(d));
    if(hasStreak){
      await db.from('achievements').upsert({name:userName,type:'streak',day:dayNum},{onConflict:'name,type,day',ignoreDuplicates:true});
      showToast('💫 7-TAGE STREAK! Unaufhaltbar!');
      await loadAchievements();
    }

    // 🦾 Du Maschine — kein Joker, kein Halbe, 30 Tage voll
    const freshProfile = await refreshProfile(userName);
    if(next.size===30 && (freshProfile?.jokers_used||0)===0 && (freshProfile?.half_used||0)===0){
      await db.from('achievements').upsert({name:userName,type:'eisenmensch',day:30},{onConflict:'name,type,day',ignoreDuplicates:true});
      showToast('🦾 STAHLARM! 30 Tage, kein Joker, kein Halbe!');
      await loadAchievements();
    }

    // Save reward quote for home screen
    const pool = (legends&&legends.length) ? legends : LEGENDS_FALLBACK;
    const leg = rnd(pool);
    const src = getByCat(leg,'motivierend') || leg.quotes;
    const q = rnd(src);
    const reward = {char:leg.char, emoji:leg.emoji, color:leg.color, quote:q.quote, date:new Date().toDateString()};
    localStorage.setItem('burpee_reward', JSON.stringify(reward));
    showToast('🎉 Tag '+dayNum+' geschafft!');
    await checkMilestones(dayNum, 'full', next);
  };

  const handleHalf = async dayNum => {
    const next = new Set(completed); next.add(dayNum);
    setCompleted(next); setCompTypes({...compTypes,[dayNum]:'half'});
    const newH = (profile?.half_used||0)+1;
    await db.from('day_completions').upsert({name:userName,day:dayNum,type:'half'},{onConflict:'name,day'});
    await db.from('profiles').update({completed_days:next.size,half_used:newH,updated_at:new Date().toISOString()}).eq('name',userName);
    const p = await refreshProfile(userName); loadLeaders();
    showToast(`🌙 Halbe reicht auch! (${2+(p?.joker_swapped?1:0)-newH} übrig)`);
    await checkMilestones(dayNum, 'half', next);
  };

  const handleJoker = async (dayNum, action) => {
    if(action==='swap'){
      const next = new Set(completed); next.add(dayNum);
      const newH = (profile?.half_used||0)+1;
      setCompleted(next); setCompTypes({...compTypes,[dayNum]:'half'});
      await db.from('day_completions').upsert({name:userName,day:dayNum,type:'half'},{onConflict:'name,day'});
      await db.from('profiles').update({completed_days:next.size,joker_swapped:true,half_used:newH,updated_at:new Date().toISOString()}).eq('name',userName);
      await refreshProfile(userName); loadLeaders();
      showToast('⚡ Joker getauscht! Avatar upgraded!');
    } else {
      const next = new Set(completed); next.add(dayNum);
      const newJ = (profile?.jokers_used||0)+1;
      setCompleted(next); setCompTypes({...compTypes,[dayNum]:'joker'});
      await db.from('day_completions').upsert({name:userName,day:dayNum,type:'joker'},{onConflict:'name,day'});
      await db.from('profiles').update({completed_days:next.size,jokers_used:newJ,updated_at:new Date().toISOString()}).eq('name',userName);
      await refreshProfile(userName); loadLeaders();
      showToast('🃏 Joker eingesetzt – morgen wieder voll!');
    }
  };

  const handleUndo = async dayNum => {
    const type = compTypes[dayNum];
    const next = new Set(completed); next.delete(dayNum);
    const nextT = {...compTypes}; delete nextT[dayNum];
    setCompleted(next); setCompTypes(nextT);
    await db.from('day_completions').delete().eq('name',userName).eq('day',dayNum);
    let updates = {completed_days:next.size};
    if(type==='half')  updates.half_used   = Math.max((profile?.half_used||0)-1,0);
    if(type==='joker') updates.jokers_used = Math.max((profile?.jokers_used||0)-1,0);
    await db.from('profiles').update(updates).eq('name',userName);
    await refreshProfile(userName); loadLeaders();
  };

  const handlePost = async (text, imageUrl=null, replyToId=null) => {
    const cur = getChallengeDay();
    const {error} = await db.from('wall_posts').insert({name:userName, avatar:profile?.avatar||'chuck', avatar_legend:profile?.avatar_legend||'chuck', avatar_pose:profile?.avatar_pose||1, message:text, day:cur, reactions:{}, image_url:imageUrl, reply_to:replyToId});
    if(error) { console.error('Wall post error:', error); showToast('❌ Fehler: '+error.message); return; }
    await loadWall();
  };

  const handleReact = async (postId, emoji) => {
    const post = wall.find(p=>p.id===postId); if(!post) return;
    const reactions = {...(post.reactions||{}),[emoji]:((post.reactions||{})[emoji]||0)+1};
    setWall(prev=>prev.map(p=>p.id===postId?{...p,reactions}:p));
    await db.from('wall_posts').update({reactions}).eq('id',postId);
    await loadWall();
  };

  const handleNudge = targetName => setFeuerTarget(targetName);

  const handleSetStatus = async (status) => {
    setShowStatusModal(false);
    const today = new Date().toISOString().split('T')[0];
    await db.from('profiles').update({daily_status:`${status.emoji} ${status.text}`, daily_status_date:today}).eq('name',userName);
    await refreshProfile(userName); loadLeaders();
    showToast(`${status.emoji} Status gesetzt: ${status.text}`);
  };

  const handleSetPakt = async (targetName) => {
    setShowPaktModal(false);
    await db.from('profiles').update({pact_with:targetName}).eq('name',userName);
    // Also set for the other person
    await db.from('profiles').update({pact_with:userName}).eq('name',targetName);
    await refreshProfile(userName); loadLeaders();
    showToast(`🤝 Pakt mit ${targetName} geschlossen!`);
    await handlePost(`🤝 ${userName} und ${targetName} haben einen Pakt geschlossen! Keiner lässt den anderen fallen! 💪`);
  };

  const handleBreakPakt = async () => {
    const paktWith = profile?.pact_with;
    setShowPaktModal(false);
    await db.from('profiles').update({pact_with:null}).eq('name',userName);
    if(paktWith) await db.from('profiles').update({pact_with:null}).eq('name',paktWith);
    await refreshProfile(userName); loadLeaders();
    showToast('Pakt aufgelöst.');
  };

  // ── SOS / Legenden-Signal ──
  const handleSos = async () => {
    // Deactivate old SOS first
    await db.from('sos_events').update({active:false}).eq('from_name',userName);
    await db.from('sos_events').insert({from_name:userName,active:true});
    await handlePost(`🆘 ${userName} kämpft gerade mit der Schwerkraft! Wer sendet Legenden-Power?!`);
    await loadSosData();
    showToast('🆘 Legenden-Signal gesendet!');
  };

  const handleSendPower = async (toName, legend, quote) => {
    await db.from('legend_powers').insert({to_name:toName, from_name:userName, legend_id:legend.id, quote, seen:false});
    // Deactivate SOS
    await db.from('sos_events').update({active:false}).eq('from_name',toName);
    await loadSosData();
    showToast(`⚡ Legenden-Power an ${toName} gesendet!`);
  };

  const handleComebackVote = async (forName, legendId) => {
    await db.from('comeback_votes').upsert({for_name:forName,voter_name:userName,legend_id:legendId},{onConflict:'for_name,voter_name',ignoreDuplicates:false});
    await loadSosData();
  };

  const handleCouchBadge = async () => {
    const today = new Date().toISOString().split('T')[0];
    await db.from('profiles').update({couch_badge_date:today}).eq('name',userName);
    await handlePost(`🛋️ ${userName} ist heute Couch-Experte... und steht dazu! Respekt für die Ehrlichkeit! 😂`);
    await refreshProfile(userName);
    showToast('🛋️ Couch-Experte Badge aktiviert!');
  };

  const handleDismissOverlay = async () => {
    if(pendingOverlay?.id){
      await db.from('legend_powers').update({seen:true}).eq('id',pendingOverlay.id);
    }
    setPendingOverlay(null);
  };

  // ── Milestone check ──
  const checkMilestones = async (dayNum, type, newCompleted) => {
    const check = async (mtype, condition) => {
      if(!condition) return;
      const {data:existing} = await db.from('milestones').select('type').eq('name',userName).eq('type',mtype).single();
      if(existing) return;
      const mdef = MILESTONES_DEF.find(m=>m.type===mtype);
      if(!mdef) return;
      await db.from('milestones').insert({name:userName,type:mtype});
      const pool = legends&&legends.length?legends:LEGENDS_FALLBACK;
      const leg = rnd(pool);
      const src = getByCat(leg,'motivierend')||leg.quotes;
      const q = rnd(src);
      await handlePost(`${mdef.emoji} ${userName} ${mdef.title}
${leg.emoji} ${leg.char}: "${q.quote}"`);
      showToast(`${mdef.emoji} ${mdef.title}`);
    };
    // Check comeback (3+ day gap)
    if(type==='full'||type==='half'){
      const curDay2 = getChallengeDay();
      const daysBefore = Array.from({length:3},(_,i)=>curDay2-i-1).filter(d=>d>0);
      const hadGap = daysBefore.some(d=>!newCompleted.has(d));
      const wasGone = daysBefore.filter(d=>!newCompleted.has(d)).length>=2;
      if(wasGone && newCompleted.size>1){
        await check('comeback',true);
        // Trigger comeback voting
        const {data:existing} = await db.from('comeback_votes').select('id').eq('for_name',userName).limit(1);
        if(!existing||existing.length===0){
          await db.from('profiles').update({comeback_seen:false}).eq('name',userName);
          await handlePost(`🌟 ${userName} ist zurück! Wählt die Legende die ihn/sie begrüßt — tippt auf den Voting-Button! 👇`);
        }
      }
    }
    await check('first_ever', newCompleted.size===1);
    await check('streak5', (profile?.current_streak||0)>=4);
    await check('halfway', dayNum===15&&(type==='full'||type==='half'));
    await check('half_portion', type==='half');
  };

  const handlePinPost = async (postId) => {
    // Unpin all first, then pin this one
    await db.from('wall_posts').update({pinned:false}).eq('pinned',true);
    await db.from('wall_posts').update({pinned:true}).eq('id',postId);
    await loadWall();
    showToast('📌 Post angeheftet!');
  };

  const handleUpdateStreak = async (newCompleted) => {
    // Calculate current streak from completions
    let streak = 0;
    const curDay3 = getChallengeDay();
    for(let d = curDay3; d >= 1; d--){
      if(newCompleted.has(d)) streak++;
      else break;
    }
    await db.from('profiles').update({current_streak:streak}).eq('name',userName);
  };

  const dismissNotif = async () => {
    if(!activeNotif) return;
    await db.from('notifications').update({read:true}).eq('id', activeNotif.id);
    const remaining = notifications.filter(n=>n.id!==activeNotif.id);
    setNotifications(remaining);
    setActiveNotif(remaining.length > 0 ? remaining[0] : null);
  };

  const handleCallWildcard = async (message) => {
    const expires = new Date(Date.now() + 24*60*60*1000).toISOString();
    await db.from('wildcards').insert({called_by:userName, message, expires_at:expires});
    await loadWildcards();
    showToast('🎰 WILDCARD gerufen! Das Team hat 24h!');
  };

  const handleCompleteWildcard = async (wildcardId) => {
    await db.from('wildcard_completions').insert({wildcard_id:wildcardId, name:userName});
    await loadWildcards();
    showToast('⚡ Wildcard abgehakt!');
  };

  const handleSendKudo = async (toName, message) => {
    setShowKudoModal(null);
    await db.from('kudos').insert({from_name:userName, to_name:toName, message});
    await loadKudos();
    await handlePost(`💪 ${userName} gibt ${toName} einen Kudo!
"${message}"`);
    await db.from('notifications').insert({to_name:toName, from_name:userName, type:'kudo', message:`💪 ${userName} gibt dir einen Kudo!
"${message}"`});
    showToast(`💪 Kudo an ${toName} gesendet!`);
  };

  const handleFeuerSend = async legend => {
    const target = feuerTarget; setFeuerTarget(null);
    const msg = `🔥 ${userName} macht Feuer unter ${target}!\n\n${legend.emoji} ${legend.char.toUpperCase()} sagt:\n"${legend.selectedQuote}"`;
    await handlePost(msg);
    await db.from('notifications').insert({to_name:target, from_name:userName, type:'feuer', message:`🔥 ${userName} macht dir Feuer!\n${legend.emoji} "${legend.selectedQuote}"`});
    setTab('wall'); showToast(`🔥 ${target} bekommt Feuer von ${legend.char}!`);
  };

  const handleSubmitQuote = async sub => {
    await db.from('quote_submissions').insert(sub);
    await loadSubmissions();
  };

  const handleVote = async subId => {
    const key = `vote_${subId}`;
    if(localStorage.getItem(key)==='1') return;
    localStorage.setItem(key,'1');
    const sub = submissions.find(s=>s.id===subId); if(!sub) return;
    const newVotes = sub.votes+1;
    setSubmissions(prev=>prev.map(s=>s.id===subId?{...s,votes:newVotes}:s));
    await db.from('quote_submissions').update({votes:newVotes}).eq('id',subId);
    if(newVotes>=5){
      await db.from('quotes').insert({legend_id:sub.legend_id,anheizer:sub.anheizer,quote:sub.quote,approved:true});
      await db.from('quote_submissions').update({approved:true}).eq('id',subId);
      await loadLegends(); await loadSubmissions();
      showToast('🔥 Spruch freigeschaltet! Er ist jetzt live!');
    }
  };

  // ── Screens ──
  if(screen==='loading') return(
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'2.5rem',marginBottom:'0.75rem',animation:'shimmer 1.2s infinite'}}>💥</div>
        <div className="bc" style={{fontSize:'0.8rem',color:'var(--muted)',letterSpacing:'0.15em'}}>LÄDT...</div>
      </div>
    </div>
  );

  if(screen==='onboarding') return <><Toast msg={toast}/><Onboarding onJoin={handleJoin} legends={legends}/></>;

  return(
    <>
      <Toast msg={toast}/>
      {showWhatsNew&&screen==='main'&&<WhatsNewModal onClose={()=>{localStorage.setItem('seen_version',APP_VERSION);setShowWhatsNew(false);}}/>}
      <NotificationBanner notif={activeNotif} onDismiss={dismissNotif}/>
      {avatarMenu&&<AvatarContextMenu targetName={avatarMenu} onFeuer={setFeuerTarget} onKudo={setShowKudoModal} onClose={()=>setAvatarMenu(null)}/>}
      {showKudoModal&&<KudoModal to={showKudoModal} from={userName} legends={legends} onSend={handleSendKudo} onCancel={()=>setShowKudoModal(null)}/>}
      {pendingOverlay&&<FullscreenOverlay type={pendingOverlay.type} legend={pendingOverlay.legend} quote={pendingOverlay.quote} fromName={pendingOverlay.from} onClose={handleDismissOverlay}/>}
      {feuerTarget&&<FeuermachenModal from={userName} to={feuerTarget} legends={legends} onSend={handleFeuerSend} onCancel={()=>setFeuerTarget(null)}/>}
      {showAvatarEditor&&<AvatarEditorModal profile={profile} legends={legends} onSave={handleSaveAvatar} onCancel={()=>setShowAvatarEditor(false)}/>}
      {showStatusModal&&<StatusModal current={profile?.daily_status} onSave={handleSetStatus} onClose={()=>setShowStatusModal(false)}/>}
      {showPaktModal&&<PaktModal user={userName} leaders={leaders} currentPakt={profile?.pact_with} onSave={handleSetPakt} onBreak={handleBreakPakt} onClose={()=>setShowPaktModal(false)}/>}
      {showCommunity&&<CommunityQuotes user={userName} legends={legends} submissions={submissions} onSubmit={handleSubmitQuote} onVote={handleVote} onClose={()=>setShowCommunity(false)}/>}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',paddingTop:'var(--safe-t)'}}>
        {tab==='home'     && <HomeTab user={userName} completed={completed} completionTypes={compTypes} onOpenDay={setWorkoutDay} leaders={leaders} profile={profile} legends={legends} onNudge={handleNudge} achievements={achievements} onKudo={setShowKudoModal} onAvatarTap={setAvatarMenu} onStatusTap={()=>setShowStatusModal(true)} onPaktTap={()=>setShowPaktModal(true)} onPinPost={handlePinPost} allCompletions={allCompletions} onSos={handleSos} onCouch={handleCouchBadge} profile={profile} sosEvents={sosEvents}/>}
        {tab==='calendar' && <CalendarTab completed={completed} completionTypes={compTypes} onOpenDay={setWorkoutDay}/>}
        {tab==='wall'     && <WallTab user={userName} profile={profile} legends={legends} wall={wall} onPost={handlePost} onReact={handleReact} onOpenCommunity={()=>setShowCommunity(true)} onPinPost={handlePinPost} sosEvents={sosEvents} comebackVotes={comebackVotes} legendPowers={legendPowers} onSendPower={handleSendPower} onComebackVote={handleComebackVote} userName={userName}/>}
        {tab==='stats'    && <StatsTab user={userName} leaders={leaders} legends={legends} completionData={allCompletions} wildcards={wildcards} wildcardCompletions={wildcardCompletions} onCallWildcard={handleCallWildcard} onCompleteWildcard={handleCompleteWildcard}/>}
        <BottomNav tab={tab} setTab={setTab}/>
      </div>
      {workoutDay&&<WorkoutScreen dayNum={workoutDay} completed={completed} completionTypes={compTypes} profile={profile} legends={legends} onComplete={handleComplete} onHalf={handleHalf} onJoker={handleJoker} onUndo={handleUndo} onBack={()=>setWorkoutDay(null)}/>}
    </>
  );
}

// ─────────────────────────────────────────────────────────
//  ERROR BOUNDARY + MOUNT
// ─────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  componentDidCatch(e,info){console.error('CRASH:',e,info);}
  render(){
    if(this.state.error) return(
      <div style={{padding:'2rem',background:'#1a0000',color:'#ff6b6b',fontFamily:'monospace',fontSize:'0.85rem',minHeight:'100vh',overflowY:'auto'}}>
        <div style={{fontSize:'1.5rem',marginBottom:'1rem'}}>💥 JavaScript Fehler</div>
        <div style={{background:'#2a0000',padding:'1rem',borderRadius:'8px',marginBottom:'1rem',wordBreak:'break-all'}}>
          <b>{this.state.error.toString()}</b>
        </div>
        <pre style={{whiteSpace:'pre-wrap',opacity:0.7,fontSize:'0.75rem'}}>{this.state.error.stack}</pre>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
