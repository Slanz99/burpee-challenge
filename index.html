// ── Avatar Component ──────────────────────────────────────
function Avatar({profile,size=40,showGimmick=true}){
  const av=profile?.avatar||'💪';
  const jokerSwapped=profile?.joker_swapped;
  const jokerUsed=(profile?.jokers_used||0)>0;
  const halfUsed=(profile?.half_used||0)>0;

  // Border gimmick
  let border='2px solid var(--border)';
  let glow='none';
  if(jokerSwapped){border='2px solid #8b5cf6';glow='0 0 12px rgba(139,92,246,0.5)';}
  else if(jokerUsed){border='2px solid #555';}

  // Badge
  let badge=null;
  if(showGimmick){
    if(jokerSwapped) badge=<span style={{position:'absolute',bottom:-4,right:-4,fontSize:'0.7rem',background:'#8b5cf6',borderRadius:'50%',width:'18px',height:'18px',display:'flex',alignItems:'center',justifyContent:'center'}}>⚡</span>;
    else if(jokerUsed) badge=<span style={{position:'absolute',bottom:-4,right:-4,fontSize:'0.7rem',background:'#333',borderRadius:'50%',width:'18px',height:'18px',display:'flex',alignItems:'center',justifyContent:'center'}}>💀</span>;
    else if(halfUsed) badge=<span style={{position:'absolute',bottom:-4,right:-4,fontSize:'0.7rem',background:'#1e3a5f',borderRadius:'50%',width:'18px',height:'18px',display:'flex',alignItems:'center',justifyContent:'center'}}>🌙</span>;
  }

  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <div style={{width:size,height:size,borderRadius:'50%',background:'var(--bg3)',border,boxShadow:glow,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.5}}>
        {av}
      </div>
      {badge}
    </div>
  );
}

// ── Token Bar ─────────────────────────────────────────────
function TokenBar({profile}){
  const jokersLeft = 1-(profile?.jokers_used||0)-(profile?.joker_swapped?1:0);
  const halfLeft   = 2+(profile?.joker_swapped?1:0)-(profile?.half_used||0);
  return(
    <div style={{display:'flex',gap:'8px',margin:'0 1.25rem 1rem'}}>
      <div style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px',padding:'0.65rem 0.85rem',display:'flex',alignItems:'center',gap:'8px'}}>
        <span style={{fontSize:'1.1rem'}}>🃏</span>
        <div>
          <div className="bc" style={{fontSize:'0.65rem',color:'var(--muted)',letterSpacing:'0.1em'}}>JOKER</div>
          <div className="bc" style={{fontSize:'1.1rem',fontWeight:800,color:jokersLeft>0?'var(--gold)':'var(--muted)'}}>{jokersLeft > 0 ? '1× verfügbar' : 'verbraucht'}</div>
        </div>
      </div>
      <div style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px',padding:'0.65rem 0.85rem',display:'flex',alignItems:'center',gap:'8px'}}>
        <span style={{fontSize:'1.1rem'}}>🌙</span>
        <div>
          <div className="bc" style={{fontSize:'0.65rem',color:'var(--muted)',letterSpacing:'0.1em'}}>HALBE</div>
          <div className="bc" style={{fontSize:'1.1rem',fontWeight:800,color:halfLeft>0?'#60a5fa':'var(--muted)'}}>

// ── Joker Modal ───────────────────────────────────────────

  const q=useRef(rnd(JOKER_QUOTES)).current;
  const jokersLeft=1-(profile?.jokers_used||0)-(profile?.joker_swapped?1:0);
  const halfLeft=2+(profile?.joker_swapped?1:0)-(profile?.half_used||0);

  const handleConfirm=()=>{
    setShaking(true);
    setTimeout(()=>{setShaking(false);onConfirm();},600);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.92)',zIndex:200,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',animation:'fadeIn 0.2s ease'}}>
      <div style={{width:'100%',maxWidth:'480px',background:'var(--bg)',borderRadius:'24px 24px 0 0',padding:'2rem 1.5rem',paddingBottom:'calc(2rem + var(--safe-b))'}}>

        </div>

        <div style={{height:'1px',background:'var(--border)',margin:'1.25rem 0'}}/>

        {/* Buttons */}
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          <button onClick={()=>{}} style={{width:'100%',padding:'1rem',background:'linear-gradient(135deg,var(--red),var(--red2))',border:'none',borderRadius:'14px',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontSize:'1.1rem',fontWeight:800,letterSpacing:'0.08em',boxShadow:'0 4px 20px rgba(230,57,70,0.4)'}}
            onClick={onCancel}>
            💪 TROTZDEM MACHEN!
          </button>

          {jokersLeft>0&&(
            <button onClick={handleConfirm}
              style={{width:'100%',padding:'0.9rem',background:'#1a1a1a',border:'2px solid #444',borderRadius:'14px',color:'#aaa',fontFamily:'Barlow Condensed,sans-serif',fontSize:'1rem',fontWeight:700,letterSpacing:'0.05em'}}>

            Abbrechen

// ── Onboarding ────────────────────────────────────────────
function Onboarding({onJoin}){
  const [step,setStep]=useState('name'); // name | avatar
  const [name,setName]=useState('');
  const [avatar,setAvatar]=useState('💪');
  const [loading,setLoading]=useState(false);

  useEffect(()=>{if(step==='name')setTimeout(()=>ref.current?.focus(),400);},[step]);

  const goAvatar=()=>{if(name.trim())setStep('avatar');};
  const join=async()=>{
    if(loading)return;setLoading(true);
    await onJoin(name.trim(),avatar);setLoading(false);
  };

  if(step==='avatar') return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{flex:1,overflowY:'auto',padding:'2rem 1.5rem 1rem',textAlign:'center'}}>

        <h2 className="bc" style={{fontSize:'2rem',fontWeight:800,marginBottom:'0.5rem',animation:'slideUp 0.3s ease both'}}>WÄHLE DEINEN AVATAR</h2>
        <p style={{color:'var(--muted)',fontSize:'0.85rem',marginBottom:'1.5rem',animation:'slideUp 0.3s 0.05s ease both'}}>Du kannst ihn später nicht ändern 😈</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:'10px',animation:'slideUp 0.3s 0.1s ease both'}}>
          {AVATARS.map(a=>(
            <button key={a} onClick={()=>setAvatar(a)}
              style={{background:avatar===a?'rgba(230,57,70,0.2)':'var(--bg2)',border:`2px solid ${avatar===a?'var(--red)':'var(--border)'}`,borderRadius:'12px',padding:'10px',fontSize:'1.6rem',transition:'all 0.15s',transform:avatar===a?'scale(1.1)':'scale(1)'}}>
              {a}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:'1.25rem',paddingBottom:'calc(1.5rem + var(--safe-b))',borderTop:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'0.75rem',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px',padding:'0.75rem 1rem'}}>
          <div style={{width:'40px',height:'40px',borderRadius:'50%',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.3rem'}}>{avatar}</div>
          <div>
            <div style={{fontWeight:600,fontSize:'0.95rem'}}>{name}</div>
            <div style={{color:'var(--muted)',fontSize:'0.75rem'}}>Bereit für 30 Tage</div>
          </div>
        </div>
        <button onClick={join} disabled={loading}
          style={{width:'100%',padding:'1rem',background:'var(--red)',border:'none',borderRadius:'14px',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontSize:'1.2rem',fontWeight:800,letterSpacing:'0.08em',opacity:loading?0.7:1}}>
          {loading?'EINEN MOMENT...':'CHALLENGE ANNEHMEN 🔥'}
        </button>
      </div>
    </div>
  );

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem 1.5rem 1rem',textAlign:'center'}}>
        <div style={{fontSize:'4.5rem',marginBottom:'0.5rem',animation:'pop 0.5s ease both'}}>💥</div>
        <h1 className="bc" style={{fontWeight:900,fontSize:'clamp(3rem,15vw,5rem)',lineHeight:0.9,textTransform:'uppercase',marginBottom:'0.75rem',animation:'slideUp 0.4s 0.1s ease both'}}>
          BURPEE<br/><span style={{color:'var(--red)'}}>CHALLENGE</span>
        </h1>
        <p style={{color:'var(--muted)',fontSize:'0.9rem',animation:'slideUp 0.4s 0.2s ease both'}}>50 Burpees · 30 Tage · Gemeinsam 🔥</p>
        <div style={{display:'flex',gap:'1rem',marginTop:'2rem',animation:'slideUp 0.4s 0.3s ease both'}}>
          {[['30','Tage'],['50','Burpees'],['1','Ziel']].map(([n,l])=>(
            <div key={l} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px',padding:'0.75rem 1.25rem',textAlign:'center'}}>
              <div className="bc" style={{fontSize:'1.8rem',fontWeight:900,color:'var(--red)',lineHeight:1}}>{n}</div>
              <div style={{fontSize:'0.72rem',color:'var(--muted)',marginTop:'2px'}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:'1.5rem',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'12px',padding:'0.9rem 1.25rem',textAlign:'left',width:'100%',maxWidth:'320px',animation:'slideUp 0.4s 0.4s ease both'}}>
          <div className="bc" style={{fontSize:'0.68rem',color:'var(--muted)',letterSpacing:'0.12em',marginBottom:'6px'}}>DEIN SAFETY NET</div>

            ⚡ <b style={{color:'var(--text)'}}>Swap</b> – Joker → extra Halbe tauschen

        </div>
      </div>
      <div style={{padding:'1.25rem',paddingBottom:'calc(1.5rem + var(--safe-b))',background:'var(--bg)',borderTop:'1px solid var(--border)',animation:'slideUp 0.4s 0.35s ease both'}}>
        <p style={{fontSize:'0.72rem',color:'var(--muted)',letterSpacing:'0.12em',marginBottom:'0.6rem',textTransform:'uppercase'}}>Dein Name</p>
        <input ref={ref} value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&goAvatar()} placeholder="z.B. Stefano, Lisa, Max..."
          style={{width:'100%',padding:'1rem',background:'var(--bg3)',border:'2px solid var(--border)',borderRadius:'14px',color:'var(--text)',fontSize:'1.05rem',marginBottom:'0.75rem',outline:'none'}}/>
        <button onClick={goAvatar} disabled={!name.trim()}
          style={{width:'100%',padding:'1rem',background:name.trim()?'var(--red)':'var(--bg3)',border:'none',borderRadius:'14px',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontSize:'1.2rem',fontWeight:800,letterSpacing:'0.08em',opacity:name.trim()?1:0.4}}>
          WEITER → AVATAR WÄHLEN
        </button>
      </div>
    </div>
  );

// ── Toast ─────────────────────────────────────────────────
function Toast({msg}){
  if(!msg)return null;
  return <div style={{position:'fixed',top:'calc(var(--safe-t) + 12px)',left:'50%',transform:'translateX(-50%)',background:'var(--red)',color:'#fff',padding:'10px 20px',borderRadius:'100px',fontSize:'0.85rem',fontWeight:600,zIndex:9999,whiteSpace:'nowrap',boxShadow:'0 4px 24px rgba(230,57,70,0.5)',animation:'slideDown 0.3s ease both'}}>{msg}</div>;
}

// ── Home Tab ──────────────────────────────────────────────
function HomeTab({user,completed,completionTypes,onOpenDay,leaders,profile}){
  const [motto,setMotto]=useState(()=>rnd(MOTIVATIONS));
  const done=completed.size,pct=Math.round((done/30)*100),cur=getChallengeDay();
  const totalBurpees=DAYS.reduce((a,d)=>{
    const t=completionTypes[d.day];
    if(!t)return a;
    const b=tot(d);
    return a+(t==='half'?Math.ceil(b/2):t==='joker'?0:b);
  },0);
  const curDay=DAYS[Math.max(cur-1,0)];

  return(
    <div style={{flex:1,overflowY:'auto',paddingBottom:'0.5rem'}}>
      <div style={{padding:'1.25rem 1.25rem 0'}}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <Avatar profile={profile} size={44}/>
            <div>
              <div className="bc" style={{fontSize:'1.5rem',fontWeight:800,lineHeight:1.1}}>Hey, <span style={{color:'var(--red)'}}>{user}</span> 👊</div>
              <div style={{color:'var(--muted)',fontSize:'0.75rem'}}>#BurpeeChallenge</div>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div className="bc" style={{fontSize:'1.8rem',fontWeight:900,color:'var(--red)',lineHeight:1}}>{totalBurpees}</div>
            <div style={{color:'var(--muted)',fontSize:'0.65rem'}}>Burpees gesamt</div>
          </div>
        </div>
        {/* Progress */}
        <div style={{marginBottom:'1rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'6px'}}>
            <span className="bc" style={{fontSize:'1rem',fontWeight:700,letterSpacing:'0.05em'}}>{done} / 30 TAGE</span>
            <span className="bc" style={{fontSize:'1.4rem',fontWeight:900,color:'var(--red)'}}>{pct}%</span>
          </div>
          <div style={{height:'8px',background:'var(--bg3)',borderRadius:'8px',overflow:'hidden',position:'relative'}}>
            <div style={{height:'100%',background:'linear-gradient(90deg,var(--red),#ff6b6b)',borderRadius:'8px',width:`${pct}%`,transition:'width 0.8s cubic-bezier(.25,.46,.45,.94)'}}/>
          </div>
        </div>
      </div>

      {/* Token Bar */}
      <TokenBar profile={profile}/>

      {/* Today CTA */}
      <div style={{padding:'0 1.25rem',marginBottom:'1rem'}}>
        {cur===0?(

            <button onClick={()=>onOpenDay(cur)}

              <div style={{fontSize:'0.68rem',color:'rgba(255,255,255,0.6)',letterSpacing:'0.15em',marginBottom:'6px'}}>
                {isDone?(type==='joker'?'🃏 JOKER EINGESETZT':type==='half'?'🌙 HALBE PORTION':'✓ HEUTE ERLEDIGT'):'HEUTE · TAG '+cur+' VON 30'}

              <div className="bc" style={{fontSize:'clamp(2rem,10vw,3rem)',fontWeight:900,color:'#fff',lineHeight:1,marginBottom:'4px'}}>

              </div>
              {curDay.oneGo&&type!=='joker'&&<span style={{display:'inline-block',background:'rgba(0,0,0,0.25)',color:'rgba(255,255,255,0.85)',fontSize:'0.65rem',padding:'3px 10px',borderRadius:'100px',letterSpacing:'0.12em',marginBottom:'6px'}}>IN ONE GO</span>}
              <div style={{fontSize:'0.82rem',color:'rgba(255,255,255,0.65)',marginTop:'4px'}}>{isDone?'Tap für Details':'Workout starten →'}</div>
            </button>
          );
        })():(
          <div className="bc" style={{background:'linear-gradient(135deg,#7c5c00,#b8860b)',borderRadius:'20px',padding:'1.5rem',textAlign:'center',fontSize:'1.8rem',fontWeight:900,letterSpacing:'0.03em'}}>🏆 CHALLENGE ABGESCHLOSSEN!</div>
        )}
      </div>

      {/* Motivation */}
      <div style={{margin:'0 1.25rem 1.5rem',display:'flex',alignItems:'center',gap:'0.75rem',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'14px',padding:'0.9rem 1rem'}}>
        <p style={{flex:1,fontSize:'0.87rem',color:'#888',fontStyle:'italic',lineHeight:1.45}}>{motto}</p>
        <button onClick={()=>setMotto(rnd(MOTIVATIONS))} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'8px',padding:'6px 8px',color:'var(--muted)',fontSize:'0.9rem',flexShrink:0}}>↻</button>
      </div>

      {/* Leaderboard */}
      {leaders.length>1&&(
        <div style={{padding:'0 1.25rem'}}>
          <div className="bc" style={{fontSize:'0.68rem',color:'var(--muted)',letterSpacing:'0.15em',marginBottom:'0.65rem'}}>🏅 RANGLISTE</div>
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'16px',overflow:'hidden'}}>
            {leaders.slice(0,5).map((u,i)=>(
              <div key={u.name} style={{display:'flex',alignItems:'center',padding:'0.85rem 1rem',borderBottom:i<Math.min(leaders.length,5)-1?'1px solid var(--border)':'none',background:u.name===user?'rgba(230,57,70,0.07)':'transparent',gap:'10px'}}>

                  <span className="bc" style={{fontSize:'1.3rem',fontWeight:900,color:'var(--red)'}}>{u.completed_days}</span>

// ── Calendar Tab ──────────────────────────────────────────
function CalendarTab({completed,completionTypes,onOpenDay}){
  const cur=getChallengeDay();
  return(
    <div style={{flex:1,overflowY:'auto',padding:'1.25rem'}}>
      <div className="bc" style={{fontSize:'1.6rem',fontWeight:800,letterSpacing:'0.05em',marginBottom:'1rem'}}>30-TAGE PLAN</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'8px'}}>
        {DAYS.map(d=>{
          const isDone=completed.has(d.day);
          const type=completionTypes[d.day];
          const isToday=d.day===cur&&!isDone;
          const t=tot(d);
          let bg='var(--bg2)',border='1.5px solid var(--border)',color='var(--text)';
          if(isDone){
            if(type==='joker'){bg='rgba(100,100,100,0.1)';border='1.5px solid #333';color='#555';}
            else if(type==='half'){bg='rgba(30,58,95,0.3)';border='1.5px solid #1e3a5f';color='#60a5fa';}

              <span style={{fontSize:'0.58rem',color:isDone?color:isToday?'var(--red)':'var(--muted)',fontWeight:600}}>
                {isDone?(type==='joker'?'🃏':type==='half'?'🌙':'✓'):isToday?'●':d.day}
              </span>
              <span className="bc" style={{fontSize:'1.15rem',fontWeight:800,color,lineHeight:1}}>
                {type==='joker'?'–':type==='half'?Math.ceil(t/2):t}

    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

        {wall.map((p,i)=>(

                  <div style={{fontSize:'0.68rem',color:'var(--muted)'}}>Tag {p.day}</div>

              </div>

            </div>
            <p style={{fontSize:'0.92rem',lineHeight:1.5,margin:'0 0 0.75rem',color:'#ddd'}}>{p.message}</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>

// ── Workout Screen ────────────────────────────────────────
function WorkoutScreen({dayNum,completed,completionTypes,profile,onComplete,onHalf,onJoker,onUndo,onBack}){
  const [showJokerModal,setShowJokerModal]=useState(false);
  const d=DAYS[dayNum-1],t=tot(d),isDone=completed.has(dayNum);
  const type=completionTypes[dayNum];
  const halfT=Math.ceil(t/2);

  const jokersLeft=1-(profile?.jokers_used||0)-(profile?.joker_swapped?1:0);
  const halfLeft=2+(profile?.joker_swapped?1:0)-(profile?.half_used||0);

  const handleJokerConfirm=async()=>{setShowJokerModal(false);await onJoker(dayNum);};
  const handleSwap=async()=>{setShowJokerModal(false);await onJoker(dayNum,'swap');};

  return(
    <>
      <div style={{position:'fixed',inset:0,background:'var(--bg)',zIndex:100,display:'flex',flexDirection:'column',animation:'slideUp 0.3s ease both'}}>
        <div style={{padding:'calc(var(--safe-t) + 1rem) 1.25rem 0.75rem',display:'flex',alignItems:'center',gap:'1rem',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <button onClick={onBack} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:'10px',padding:'8px 14px',color:'var(--text)',fontSize:'0.9rem'}}>←</button>

          {isDone&&(
            <div style={{marginLeft:'auto',borderRadius:'100px',padding:'4px 12px',fontSize:'0.72rem',fontWeight:600,
              background:type==='joker'?'rgba(80,80,80,0.2)':type==='half'?'rgba(30,58,95,0.3)':'rgba(74,222,128,0.15)',
              border:type==='joker'?'1px solid #444':type==='half'?'1px solid #1e3a5f':'1px solid #2d5a2d',
              color:type==='joker'?'#888':type==='half'?'#60a5fa':'var(--green)'}}>
              {type==='joker'?'🃏 Joker':type==='half'?'🌙 Halbe':'✓ Erledigt'}

          )}
        </div>

        <div style={{textAlign:'center',padding:'1.75rem 1.25rem 1.25rem',flexShrink:0}}>
          <div className="bc" style={{fontWeight:900,fontSize:'min(28vw,7rem)',color:'var(--red)',lineHeight:0.9}}>{type==='joker'?'🃏':type==='half'?halfT:t}</div>
          <div className="bc" style={{fontWeight:700,fontSize:'1.4rem',letterSpacing:'0.2em',color:'var(--muted)',marginTop:'4px'}}>
            {type==='joker'?'SKIP TAG':'BURPEES'}{type==='half'&&<span style={{color:'#60a5fa'}}> (HALBE)</span>}
          </div>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'0 1.25rem'}}>

              <div className="bc" style={{fontSize:'2rem',fontWeight:900,color:'var(--red)',letterSpacing:'0.05em'}}>IN ONE GO</div>
              <div style={{color:'var(--muted)',fontSize:'0.8rem',marginTop:'0.5rem'}}>Alle {type==='half'?halfT:t} Burpees am Stück</div>
              <div style={{display:'inline-block',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'8px',padding:'6px 14px',fontSize:'0.75rem',color:'var(--muted)',marginTop:'0.75rem'}}>20 Sek. Pause zwischen Sätzen</div>

                    🌙 Halbe ({halfLeft}×)

                )}
                <button onClick={()=>setShowJokerModal(true)}
                  style={{flex:1,padding:'0.85rem',background:'rgba(100,100,100,0.1)',border:'2px solid #2a2a2a',borderRadius:'14px',color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontSize:'0.95rem',fontWeight:700,letterSpacing:'0.05em'}}>

                borderRadius:'16px',padding:'1.1rem',textAlign:'center',fontSize:'1.3rem',fontWeight:800,letterSpacing:'0.05em',
                color:type==='joker'?'#666':type==='half'?'#60a5fa':'var(--green)'}}>

  );
}

// ── Main App ──────────────────────────────────────────────
function App(){
  const [screen,setScreen]       =useState('loading');
  const [tab,setTab]             =useState('home');
  const [userName,setUserName]   =useState('');
  const [completed,setCompleted] =useState(new Set());
  const [compTypes,setCompTypes] =useState({});  // {dayNum: 'full'|'half'|'joker'}
  const [profile,setProfile]     =useState(null);
  const [leaders,setLeaders]     =useState([]);
  const [wall,setWall]           =useState([]);
  const [workoutDay,setWorkoutDay]=useState(null);
  const [toast,setToast]         =useState('');
  const timer=useRef(null);

  const showToast=msg=>{setToast(msg);clearTimeout(timer.current);timer.current=setTimeout(()=>setToast(''),3200);};

  const loadUser=useCallback(async name=>{
    const{data:comp}=await db.from('day_completions').select('day,type').eq('name',name);
    if(comp){
      setCompleted(new Set(comp.map(d=>d.day)));
      const types={};comp.forEach(d=>{types[d.day]=d.type||'full';});
      setCompTypes(types);
    }
    const{data:prof}=await db.from('profiles').select('*').eq('name',name).single();
    if(prof)setProfile(prof);
    setScreen('main');
  },[]);

  const loadLeaders=useCallback(async()=>{
    const{data}=await db.from('profiles').select('*').order('completed_days',{ascending:false}).limit(15);
    if(data)setLeaders(data);
  },[]);

  const loadWall=useCallback(async()=>{
    const{data}=await db.from('wall_posts').select('*').order('created_at',{ascending:false}).limit(60);
    if(data)setWall(data);
  },[]);

  useEffect(()=>{
    const saved=localStorage.getItem('burpee_name');
    if(saved){setUserName(saved);loadUser(saved);}else setScreen('onboarding');
    loadLeaders();loadWall();
    const ch=db.channel('live')
      .on('postgres_changes',{event:'*',schema:'public',table:'wall_posts'},loadWall)
      .on('postgres_changes',{event:'*',schema:'public',table:'profiles'},loadLeaders)
      .subscribe();
    return()=>ch.unsubscribe();
  },[loadUser,loadLeaders,loadWall]);

  const refreshProfile=async(name)=>{
    const{data}=await db.from('profiles').select('*').eq('name',name).single();
    if(data){setProfile(data);return data;}
    return null;
  };

  const handleJoin=async(name,avatar)=>{
    await db.from('profiles').upsert({name,avatar,completed_days:0,jokers_used:0,half_used:0,joker_swapped:false},{onConflict:'name',ignoreDuplicates:true});
    localStorage.setItem('burpee_name',name);
    setUserName(name);await loadUser(name);
    showToast(`🎉 Willkommen, ${name}!`);
  };

  const handleComplete=async dayNum=>{
    const next=new Set(completed);next.add(dayNum);
    const nextTypes={...compTypes,[dayNum]:'full'};
    setCompleted(next);setCompTypes(nextTypes);
    await db.from('day_completions').upsert({name:userName,day:dayNum,type:'full'},{onConflict:'name,day'});
    await db.from('profiles').update({completed_days:next.size,updated_at:new Date().toISOString()}).eq('name',userName);
    await refreshProfile(userName);loadLeaders();showToast(rnd(MOTIVATIONS));
  };

  const handleHalf=async dayNum=>{
    const next=new Set(completed);next.add(dayNum);
    const nextTypes={...compTypes,[dayNum]:'half'};
    setCompleted(next);setCompTypes(nextTypes);
    const newHalfUsed=(profile?.half_used||0)+1;
    await db.from('day_completions').upsert({name:userName,day:dayNum,type:'half'},{onConflict:'name,day'});
    await db.from('profiles').update({completed_days:next.size,half_used:newHalfUsed,updated_at:new Date().toISOString()}).eq('name',userName);
    const p=await refreshProfile(userName);loadLeaders();
    showToast(`🌙 Halbe Portion – macht man! (${2+(p?.joker_swapped?1:0)-newHalfUsed} übrig)`);
  };

  const handleJoker=async(dayNum,action)=>{
    if(action==='swap'){
      // Swap: joker_swapped=true, gain +1 halbe, use it immediately as halbe
      const next=new Set(completed);next.add(dayNum);
      const nextTypes={...compTypes,[dayNum]:'half'};
      setCompleted(next);setCompTypes(nextTypes);
      const newHalfUsed=(profile?.half_used||0)+1;
      await db.from('day_completions').upsert({name:userName,day:dayNum,type:'half'},{onConflict:'name,day'});
      await db.from('profiles').update({completed_days:next.size,joker_swapped:true,half_used:newHalfUsed,updated_at:new Date().toISOString()}).eq('name',userName);
      await refreshProfile(userName);loadLeaders();
      showToast('⚡ Joker getauscht! Avatar upgraded + halbe Portion done!');
    } else {
      const next=new Set(completed);next.add(dayNum);
      const nextTypes={...compTypes,[dayNum]:'joker'};
      setCompleted(next);setCompTypes(nextTypes);
      const newJokersUsed=(profile?.jokers_used||0)+1;
      await db.from('day_completions').upsert({name:userName,day:dayNum,type:'joker'},{onConflict:'name,day'});
      await db.from('profiles').update({completed_days:next.size,jokers_used:newJokersUsed,updated_at:new Date().toISOString()}).eq('name',userName);
      await refreshProfile(userName);loadLeaders();
      showToast('🃏 Joker eingesetzt – morgen wieder voll dabei!');
    }
  };

  const handleUndo=async dayNum=>{
    const type=compTypes[dayNum];
    const next=new Set(completed);next.delete(dayNum);
    const nextTypes={...compTypes};delete nextTypes[dayNum];
    setCompleted(next);setCompTypes(nextTypes);
    await db.from('day_completions').delete().eq('name',userName).eq('day',dayNum);
    // Restore token if applicable
    let updates={completed_days:next.size};
    if(type==='half') updates.half_used=Math.max((profile?.half_used||0)-1,0);
    if(type==='joker') updates.jokers_used=Math.max((profile?.jokers_used||0)-1,0);
    await db.from('profiles').update(updates).eq('name',userName);
    await refreshProfile(userName);loadLeaders();
  };

  const handlePost=async text=>{
    const cur=getChallengeDay();
    await db.from('wall_posts').insert({name:userName,avatar:profile?.avatar||'💪',message:text,day:cur,reactions:{}});
  };

  const handleReact=async(postId,emoji)=>{
    const post=wall.find(p=>p.id===postId);if(!post)return;
    const reactions={...(post.reactions||{}),[emoji]:((post.reactions||{})[emoji]||0)+1};
    setWall(prev=>prev.map(p=>p.id===postId?{...p,reactions}:p));
    await db.from('wall_posts').update({reactions}).eq('id',postId);
  };

  if(screen==='loading')return(
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'2.5rem',marginBottom:'0.75rem',animation:'shimmer 1.2s infinite'}}>💥</div>
        <div className="bc" style={{fontSize:'0.8rem',color:'var(--muted)',letterSpacing:'0.15em'}}>LÄDT...</div>
      </div>
    </div>
  );

  if(screen==='onboarding')return<><Toast msg={toast}/><Onboarding onJoin={handleJoin}/></>;

  return(
    <>
      <Toast msg={toast}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',paddingTop:'var(--safe-t)'}}>
        {tab==='home'    &&<HomeTab user={userName} completed={completed} completionTypes={compTypes} onOpenDay={setWorkoutDay} leaders={leaders} profile={profile}/>}
        {tab==='calendar'&&<CalendarTab completed={completed} completionTypes={compTypes} onOpenDay={setWorkoutDay}/>}
        {tab==='wall'    &&<WallTab user={userName} profile={profile} completed={completed} wall={wall} onPost={handlePost} onReact={handleReact}/>}
        <BottomNav tab={tab} setTab={setTab}/>
      </div>
      {workoutDay&&<WorkoutScreen dayNum={workoutDay} completed={completed} completionTypes={compTypes} profile={profile} onComplete={handleComplete} onHalf={handleHalf} onJoker={handleJoker} onUndo={handleUndo} onBack={()=>setWorkoutDay(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
